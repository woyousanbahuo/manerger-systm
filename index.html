    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft YaHei", Tahoma, Simsun, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        input[type="date"], input[type="text"], input[type="number"], input[type="password"], select, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f1f1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-hidden { display: none; opacity: 0; pointer-events: none; }
        .modal-active { display: flex; opacity: 1; pointer-events: auto; }
        .transition-opacity { transition: opacity 0.3s ease; }
        [contenteditable] { user-select: text; }

        /* 权限控制核心 CSS */
        body:not(.is-admin) .admin-only {
            display: none !important;
        }

        /* ================= 移动端卡片式表格神仙适配 ================= */
        @media (max-width: 768px) {
            .responsive-table-wrapper { border: none !important; box-shadow: none !important; background: transparent !important; }
            .responsive-table { border: none !important; box-shadow: none !important; }
            .responsive-table thead { display: none; }
            .responsive-table tbody { display: flex; flex-direction: column; gap: 1rem; padding-bottom: 1rem; }
            .responsive-table tbody tr {
                display: flex; flex-direction: column;
                background-color: #ffffff;
                border-radius: 0.75rem;
                box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
                border: 1px solid #e2e8f0;
                overflow: hidden;
            }
            .responsive-table tbody td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0.75rem 1rem !important;
                border-bottom: 1px solid #f1f5f9;
                white-space: normal !important; 
                text-align: right;
                gap: 1rem;
            }
            .responsive-table tbody td:last-child { border-bottom: none; background-color: #f8fafc; }
            .responsive-table tbody td::before {
                content: attr(data-label);
                font-weight: 500;
                color: #64748b;
                text-align: left;
                flex-shrink: 0;
            }
            .responsive-table tbody td.img-cell { justify-content: center; background-color: #f8fafc; padding: 1.5rem !important; }
            .responsive-table tbody td.img-cell::before { content: none; } 
            .responsive-table tbody td.img-cell img, 
            .responsive-table tbody td.img-cell .bg-slate-100 { width: 6rem; height: 6rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
            .responsive-table tbody td > div.group { justify-content: flex-end; width: 100%; }
            .responsive-table tbody td.action-cell { justify-content: flex-end; }
            .responsive-table tbody td.action-cell::before { content: none; } 
        }
    </style>

<body class="bg-slate-50 text-slate-800 min-h-screen relative">

    <nav class="bg-blue-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- 左侧 Logo 与标题 (移动端截断处理) -->
                <div class="flex items-center flex-shrink min-w-0">
                    <input type="file" id="logoUploadInput" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
                    <img id="companyLogo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%232563eb'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4'/%3E%3C/svg%3E" alt="公司Logo" onclick="triggerLogoUpload()" class="h-8 w-8 sm:h-10 sm:w-10 mr-2 sm:mr-3 flex-shrink-0 rounded-full bg-white object-cover shadow-sm cursor-pointer hover:opacity-80 transition-opacity" title="点击更换Logo">
                    <span id="companyName" class="font-bold text-sm sm:text-xl tracking-tight truncate max-w-[140px] sm:max-w-xs md:max-w-md lg:max-w-lg cursor-text border-b-2 border-transparent hover:border-white/50 focus:border-white focus:outline-none transition-colors" contenteditable="false" onblur="saveCompanyName()" title="管理员可修改系统名称">港坤公司办公用品管理系统</span>
                </div>
                
                <!-- 右侧操作区 (移动端紧凑处理) -->
                <div class="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
                    <button id="navLoginBtn" onclick="openAuthModal('login')" class="flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 bg-blue-700 hover:bg-blue-800 rounded-lg text-xs sm:text-sm font-medium transition-colors shadow-sm border border-blue-400">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                        <span class="hidden sm:inline">管理登录</span>
                    </button>
                    
                    <button id="navChangePwdBtn" onclick="openAuthModal('changePwd')" class="hidden flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 bg-slate-700 hover:bg-slate-800 rounded-lg text-xs sm:text-sm font-medium transition-colors shadow-sm border border-slate-500" title="修改管理密码">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        <span class="hidden sm:inline">密码</span>
                    </button>
                    
                    <button onclick="exportStandaloneApp()" class="admin-only flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 bg-indigo-700 hover:bg-indigo-800 rounded-lg text-xs sm:text-sm font-medium transition-colors shadow-sm border border-indigo-400" title="生成包含Logo和数据的独立网页">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span class="hidden sm:inline">打包分享</span>
                    </button>
                    
                    <button id="navLogoutBtn" onclick="logoutAdmin()" class="hidden flex items-center px-2 py-1.5 sm:px-3 sm:py-1.5 bg-red-600 hover:bg-red-700 rounded-lg text-xs sm:text-sm font-medium transition-colors shadow-sm border border-red-400">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        <span class="hidden sm:inline">退出</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 权限提示横幅 -->
    <div id="readOnlyBanner" class="bg-amber-50 border-b border-amber-200 px-4 py-2 text-center text-xs sm:text-sm text-amber-700 transition-opacity duration-300 shadow-inner">
        当前为 <strong>只读浏览模式</strong>。可自由搜索查阅，操作或修改数据请先 <a href="#" onclick="openAuthModal('login'); return false;" class="underline font-bold text-amber-800">登录</a>。
    </div>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-6">
        
        <div class="border-b border-slate-200 mb-4 sm:mb-6">
            <nav class="-mb-px flex space-x-4 sm:space-x-8" aria-label="Tabs">
                <button onclick="switchTab('transactions')" id="tab-transactions" class="border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm sm:text-base transition-colors">出入库明细</button>
                <button onclick="switchTab('inventory')" id="tab-inventory" class="border-blue-500 text-blue-600 whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm sm:text-base transition-colors">当前库存展示</button>
            </nav>
        </div>

        <!-- ======================= 出入库视图 ======================= -->
        <div id="transactionsView" class="hidden">
            <!-- 手机端优化间距的筛选和操作区 -->
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-4 sm:mb-6 gap-3 sm:gap-4">
                
                <div class="flex flex-col sm:flex-row w-full lg:w-auto gap-3">
                    <div class="relative w-full sm:w-64 lg:w-80">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="搜索名称、经办人、备注..." class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition duration-150 ease-in-out shadow-sm">
                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <input type="date" id="startDate" onchange="handleDateFilter()" class="flex-1 sm:flex-none block w-full px-2 py-2 border border-slate-300 rounded-lg leading-5 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-xs sm:text-sm transition duration-150 ease-in-out shadow-sm" title="开始日期">
                        <span class="text-slate-400 text-xs">至</span>
                        <input type="date" id="endDate" onchange="handleDateFilter()" class="flex-1 sm:flex-none block w-full px-2 py-2 border border-slate-300 rounded-lg leading-5 bg-white text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-xs sm:text-sm transition duration-150 ease-in-out shadow-sm" title="结束日期">
                    </div>
                </div>

                <div class="flex w-full sm:w-auto gap-2 sm:gap-3 flex-wrap admin-only">
                    <button onclick="deleteSelected()" id="batchDeleteBtn" disabled class="flex-1 sm:flex-none flex items-center justify-center px-3 py-2 bg-red-600 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        删除 (<span id="selectedCount">0</span>)
                    </button>
                    <button onclick="openModal()" class="flex-1 sm:flex-none flex items-center justify-center px-3 py-2 bg-blue-600 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        入/出库
                    </button>
                    <button onclick="exportToExcel()" class="flex-1 sm:flex-none flex items-center justify-center px-3 py-2 bg-emerald-600 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        导表
                    </button>
                </div>
            </div>

            <!-- 卡片式表格容器 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden responsive-table-wrapper">
                <div class="overflow-x-auto">
                    <table id="inventoryTable" class="min-w-full divide-y divide-slate-200 responsive-table">
                        <thead class="bg-slate-50">
                            <tr>
                                <th scope="col" class="admin-only px-4 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider w-12">
                                    <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(event)" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer w-4 h-4">
                                </th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">序号</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">日期</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">物品名称</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                                    <div class="flex items-center">
                                        操作类型
                                        <select id="typeFilter" onchange="handleTypeFilter()" class="ml-1 bg-transparent border-none text-slate-500 font-semibold cursor-pointer focus:outline-none focus:ring-0 text-xs">
                                            <option value="all">全部</option>
                                            <option value="入库">入库</option>
                                            <option value="出库">出库</option>
                                        </select>
                                    </div>
                                </th>
                                <th scope="col" onclick="toggleSort()" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors select-none group" title="点击按数量排序">
                                    <div class="flex items-center">
                                        数量
                                        <span id="sortIcon" class="ml-1 text-slate-400 group-hover:text-slate-600">
                                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                        </span>
                                    </div>
                                </th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">单位</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">经办人</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">备注</th>
                                <th scope="col" class="admin-only px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="bg-white divide-y divide-slate-200"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="hidden flex-col items-center justify-center py-12 text-slate-500">
                    <svg class="h-12 w-12 sm:h-16 sm:w-16 mb-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
                    </svg>
                    <p class="text-sm sm:text-lg">暂无匹配的数据记录</p>
                </div>
            </div>
        </div>

        <!-- ======================= 库存视图 ======================= -->
        <div id="inventoryView">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-3 sm:gap-4">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="inventorySearchInput" placeholder="搜索物品名称..." class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition duration-150 ease-in-out shadow-sm" oninput="handleInventorySearch()">
                    </div>
                    <span id="inventoryCountDisplay" class="text-xs sm:text-sm font-medium text-slate-600 bg-slate-100 px-2 sm:px-3 py-1.5 rounded-lg whitespace-nowrap border border-slate-200 shadow-sm">共 0 个品类</span>
                </div>
                <button onclick="openCategoryModal()" class="admin-only w-full sm:w-auto justify-center flex items-center px-4 py-2 bg-indigo-600 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <svg class="-ml-1 mr-1.5 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    直接建档
                </button>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden responsive-table-wrapper">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 responsive-table">
                        <thead class="bg-slate-50">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">物品图片</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">物品名称</th>
                                <th scope="col" onclick="toggleInventorySort()" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors select-none group" title="点击按库存数量排序">
                                    <div class="flex items-center">
                                        当前库存
                                        <span id="inventorySortIcon" class="ml-1 text-slate-400 group-hover:text-slate-600">
                                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                        </span>
                                    </div>
                                </th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">单位</th>
                                <th scope="col" class="admin-only px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="bg-white divide-y divide-slate-200"></tbody>
                    </table>
                </div>
            </div>

    <script>
        /* ================= UI 工具：自定义弹窗 ================= */
        function showCustomDialog({ title = '提示', message, type = 'alert', defaultValue = '' }) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('customDialog');
                const titleEl = document.getElementById('dialogTitle');
                const messageEl = document.getElementById('dialogMessage');
                const inputEl = document.getElementById('dialogInput');
                const cancelBtn = document.getElementById('dialogCancelBtn');
                const confirmBtn = document.getElementById('dialogConfirmBtn');

                titleEl.innerText = title;
                messageEl.innerText = message;
                inputEl.value = defaultValue;

                inputEl.classList.add('hidden');
                cancelBtn.classList.add('hidden');
                
                if (type === 'prompt') {
                    inputEl.classList.remove('hidden');
                    cancelBtn.classList.remove('hidden');
                } else if (type === 'confirm') {
                    cancelBtn.classList.remove('hidden');
                }

                dialog.classList.remove('hidden');
                dialog.classList.add('flex');
                if (type === 'prompt') setTimeout(() => inputEl.focus(), 100);

                const cleanup = () => {
                    dialog.classList.add('hidden');
                    dialog.classList.remove('flex');
                    cancelBtn.onclick = null;
                    confirmBtn.onclick = null;
                };

                cancelBtn.onclick = () => { cleanup(); resolve(null); };
                confirmBtn.onclick = () => {
                    cleanup();
                    if (type === 'prompt') resolve(inputEl.value);
                    else if (type === 'confirm') resolve(true);
                    else resolve(true);
                };
            });
        }

        /* ================= 权限控制核心逻辑 ================= */
        let isAdmin = false; 
        if (!localStorage.getItem('adminPassword')) {
            localStorage.setItem('adminPassword', '123456');
        }
        
        let authMode = 'login';

        function openAuthModal(mode) {
            authMode = mode;
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const hint = document.getElementById('authHint');
            const oldPwdGroup = document.getElementById('oldPwdGroup');
            const mainLabel = document.getElementById('mainPwdLabel');
            const submitBtn = document.getElementById('authSubmitBtn');
            
            document.getElementById('authForm').reset();

            if (mode === 'login') {
                title.innerText = '管理员登录';
                oldPwdGroup.classList.add('hidden');
                document.getElementById('authOldPwd').removeAttribute('required');
                mainLabel.innerText = '管理密码';
                hint.classList.remove('hidden');
                submitBtn.innerText = '安全登录';
            } else {
                title.innerText = '修改管理密码';
                oldPwdGroup.classList.remove('hidden');
                document.getElementById('authOldPwd').setAttribute('required', 'true');
                mainLabel.innerText = '新密码';
                hint.classList.add('hidden');
                submitBtn.innerText = '确认修改';
            }

            modal.classList.remove('modal-hidden');
            modal.classList.add('modal-active');
            setTimeout(() => {
                document.getElementById(mode === 'login' ? 'authMainPwd' : 'authOldPwd').focus();
            }, 100);
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('modal-active');
            document.getElementById('authModal').classList.add('modal-hidden');
        }

        async function handleAuthSubmit(event) {
            event.preventDefault();
            const savedPwd = localStorage.getItem('adminPassword');
            const mainPwd = document.getElementById('authMainPwd').value;

            if (authMode === 'login') {
                if (mainPwd === savedPwd) {
                    setAdminStatus(true);
                    closeAuthModal();
                    showToast('登录成功！已进入管理模式。');
                } else {
                    await showCustomDialog({ title: '登录失败', message: '密码错误！请重试。' });
                }
            } else if (authMode === 'changePwd') {
                const oldPwd = document.getElementById('authOldPwd').value;
                if (oldPwd !== savedPwd) {
                    await showCustomDialog({ title: '修改失败', message: '原密码验证错误！' });
                    return;
                }
                if (mainPwd.trim() === '') {
                    await showCustomDialog({ title: '修改失败', message: '新密码不能为空！' });
                    return;
                }
                localStorage.setItem('adminPassword', mainPwd);
                closeAuthModal();
                showToast('密码修改成功！');
            }
        }

        function logoutAdmin() {
            setAdminStatus(false);
            showToast('已退出管理，回到只读模式。');
        }

        function setAdminStatus(status) {
            isAdmin = status;
            
            if (isAdmin) {
                document.body.classList.add('is-admin');
                document.getElementById('navLoginBtn').classList.add('hidden');
                document.getElementById('navLogoutBtn').classList.remove('hidden');
                document.getElementById('navChangePwdBtn').classList.remove('hidden');

                document.getElementById('companyName').setAttribute('contenteditable', 'true');
                document.getElementById('companyName').classList.add('border-white/30');
            } else {
                document.body.classList.remove('is-admin');
                document.getElementById('navLoginBtn').classList.remove('hidden');
                document.getElementById('navLogoutBtn').classList.add('hidden');
                document.getElementById('navChangePwdBtn').classList.add('hidden');
                document.getElementById('readOnlyBanner').classList.remove('hidden');
                document.getElementById('companyName').setAttribute('contenteditable', 'false');
                document.getElementById('companyName').classList.remove('border-white/30');
                
                selectedIds.clear();
                updateBatchDeleteBtn();
            }

            updateTable();
            renderInventory();
        }

        function saveDataToStorage() {
            try {
                localStorage.setItem('inventoryData_v6', JSON.stringify(inventoryData));
                localStorage.setItem('productCatalog_v6', JSON.stringify(productCatalog));
            } catch (e) {
                showCustomDialog({ message: '数据保存失败，请检查浏览器存储空间。' });
            }
        }

        function initCatalog() {
            let catalogChanged = false;
            inventoryData.forEach(item => {
                if (!productCatalog[item.itemName]) {
                    productCatalog[item.itemName] = { unit: item.unit, image: null, stockOffset: 0 };
                    catalogChanged = true;
                }
            });
            if (catalogChanged) saveDataToStorage();
        }

        function toggleItemDropdown() {
            const dropdown = document.getElementById('itemDropdown');
            if (dropdown.classList.contains('hidden')) { populateItemDropdown(''); dropdown.classList.remove('hidden'); } 
            else { dropdown.classList.add('hidden'); }
        }
        function showSuggestions() {
            const val = document.getElementById('formItemName').value.trim();
            const dropdown = document.getElementById('itemDropdown');
            if (val.length > 0) {
                if (populateItemDropdown(val)) dropdown.classList.remove('hidden');
                else dropdown.classList.add('hidden');
            } else { dropdown.classList.add('hidden'); }
        }
        function populateItemDropdown(filterText) {
            const dropdown = document.getElementById('itemDropdown');
            dropdown.innerHTML = '';
            const items = Object.keys(productCatalog);
            let matchCount = 0;
            items.forEach(itemName => {
                if (itemName.toLowerCase().includes(filterText.toLowerCase())) {
                    const li = document.createElement('li');
                    li.className = "px-4 py-3 sm:py-2 hover:bg-blue-50 cursor-pointer text-sm text-slate-700 border-b border-slate-50 last:border-0 transition-colors";
                    li.innerText = itemName;
                    li.onclick = function() {
                        document.getElementById('formItemName').value = itemName;
                        dropdown.classList.add('hidden');
                        handleItemNameInput(); 
                    };
                    dropdown.appendChild(li);
                    matchCount++;
                }
            });
            return matchCount > 0;
        }
        document.addEventListener('click', function(event) {
            const inputDiv = document.getElementById('formItemName')?.parentElement;
            if (inputDiv && !inputDiv.contains(event.target)) document.getElementById('itemDropdown')?.classList.add('hidden');
        });
        function handleItemNameInput() {
            const itemName = document.getElementById('formItemName').value.trim();
            const unitInput = document.getElementById('formUnit');
            if (productCatalog[itemName]) {
                unitInput.value = productCatalog[itemName].unit;
                unitInput.readOnly = true;
                unitInput.classList.add('bg-slate-100', 'text-slate-500');

                if (unitInput.readOnly) {

        // 渲染明细表格（适配了手机端 data-label）
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            
            updateSelectAllCheckboxState();

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                tbody.parentElement.classList.add('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                tbody.parentElement.classList.remove('hidden');
            }

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                const typeStyle = item.type === '入库' ? 'bg-emerald-100 text-emerald-800' : 'bg-amber-100 text-amber-800';
                const isSelected = selectedIds.has(item.id);
                
                let html = '';
                if (isAdmin) {
                    html += `
                    <td data-label="批量选择" class="px-4 py-4 whitespace-nowrap">
                        <input type="checkbox" value="${item.id}" onchange="toggleSelectRow(event, ${item.id})" ${isSelected ? 'checked' : ''} class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer w-4 h-4 sm:w-5 sm:h-5">
                    </td>`;
                }
                
                html += `
                    <td data-label="序号" class="px-6 py-4 text-sm text-slate-500">${index + 1}</td>
                    <td data-label="日期" class="px-6 py-4 text-sm text-slate-900">${item.date}</td>
                    <td data-label="物品名称" class="px-6 py-4 text-sm font-bold text-slate-900">${item.itemName}</td>
                    <td data-label="操作类型" class="px-6 py-4 text-sm"><span class="px-2 py-0.5 inline-flex text-xs leading-5 font-bold rounded-md shadow-sm ${typeStyle}">${item.type}</span></td>
                    <td data-label="数量" class="px-6 py-4 text-sm text-slate-900 font-bold">${item.quantity}</td>
                    <td data-label="单位" class="px-6 py-4 text-sm text-slate-500">${item.unit}</td>
                    <td data-label="经办人" class="px-6 py-4 text-sm text-slate-700">${item.handler}</td>
                    <td data-label="备注" class="px-6 py-4 text-sm text-slate-500 sm:truncate sm:max-w-xs">${item.remarks || '-'}</td>
                `;

                if (isAdmin) {
                    html += `
                    <td data-label="明细操作" class="action-cell px-6 py-4 text-sm text-slate-500">
                        <button onclick="deleteSingle(${item.id})" class="text-red-500 hover:text-white hover:bg-red-500 px-3 py-1.5 rounded-lg font-medium focus:outline-none transition-colors border border-red-200 hover:border-transparent">删除记录</button>
                    </td>`;
                }
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function toggleSelectRow(event, id) {
            if (event.target.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            updateBatchDeleteBtn();
            updateSelectAllCheckboxState();
        }
        function toggleSelectAll(event) {
            const isChecked = event.target.checked;
            currentViewData.forEach(item => {
                if (isChecked) selectedIds.add(item.id);
                else selectedIds.delete(item.id);
            });
            renderTable(currentViewData); 
            updateBatchDeleteBtn();
        }
        function updateBatchDeleteBtn() {
            const btn = document.getElementById('batchDeleteBtn');
            const countSpan = document.getElementById('selectedCount');
            if (!btn) return;
            if (selectedIds.size > 0) { btn.disabled = false; countSpan.innerText = selectedIds.size; } 
            else { btn.disabled = true; countSpan.innerText = '0'; }
        }
        function updateSelectAllCheckboxState() {
            const selectAllCb = document.getElementById('selectAllCheckbox');
            if (!selectAllCb) return;
            if (currentViewData.length === 0) { selectAllCb.checked = false; return; }
            selectAllCb.checked = currentViewData.every(item => selectedIds.has(item.id));
        }

        async function deleteSingle(id) {
            const confirmed = await showCustomDialog({ title: '删除确认', message: '确定要删除这条记录吗？\n删除后当前库存将被重新计算。', type: 'confirm' });
            if (!confirmed) return;
            performDelete(new Set([id]));
        }
        
        async function deleteSelected() {
            if (selectedIds.size === 0) return;
            const confirmed = await showCustomDialog({ title: '批量删除', message: `确定要删除选中的 ${selectedIds.size} 条记录吗？\n删除后当前库存将被重新计算。`, type: 'confirm' });
            if (!confirmed) return;
            performDelete(selectedIds);
        }
        
        function performDelete(idsToDelete) {
            inventoryData = inventoryData.filter(item => !idsToDelete.has(item.id));
            idsToDelete.forEach(id => selectedIds.delete(id));
            saveDataToStorage();
            updateTable(); 
            if (!document.getElementById('inventoryView').classList.contains('hidden')) renderInventory();
            updateBatchDeleteBtn(); 
            showToast('已成功删除记录！');
        }

        function handleSearch(e) { currentSearchKeyword = e.target.value.toLowerCase().trim(); updateTable(); }
        function handleDateFilter() { currentStartDate = document.getElementById('startDate').value; currentEndDate = document.getElementById('endDate').value; updateTable(); }
        function handleTypeFilter() { currentTypeFilter = document.getElementById('typeFilter').value; updateTable(); }
        function toggleSort() {
            if (currentSort === 'none') currentSort = 'desc'; else if (currentSort === 'desc') currentSort = 'asc'; else currentSort = 'none';
            const sortIcon = document.getElementById('sortIcon');
            if (currentSort === 'desc') sortIcon.innerHTML = '<svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>';
            else if (currentSort === 'asc') sortIcon.innerHTML = '<svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>';
            else sortIcon.innerHTML = '<svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>';
            updateTable();
        }
        
        function updateTable() {
            // 过滤掉“系统初始化”的记录，只在后台用于计算库存，不在前台明细中展示和导出
            let result = inventoryData.filter(item => item.handler !== '系统初始化');
            
            if (currentSearchKeyword) {
                result = result.filter(item => item.itemName.toLowerCase().includes(currentSearchKeyword) || item.handler.toLowerCase().includes(currentSearchKeyword) || (item.remarks && item.remarks.toLowerCase().includes(currentSearchKeyword)));
            }
            if (currentTypeFilter !== 'all') result = result.filter(item => item.type === currentTypeFilter);
            if (currentStartDate) result = result.filter(item => item.date >= currentStartDate);
            if (currentEndDate) result = result.filter(item => item.date <= currentEndDate);
            if (currentSort !== 'none') {
                result = [...result];
                result.sort((a, b) => currentSort === 'asc' ? a.quantity - b.quantity : b.quantity - a.quantity);
            }
            currentViewData = result; 
            renderTable(result);
        }

            inventoryData.forEach(item => {
                if (!stockMap[item.itemName]) stockMap[item.itemName] = 0;
                if (item.type === '入库') stockMap[item.itemName] += item.quantity;
                else if (item.type === '出库') stockMap[item.itemName] -= item.quantity;
            });
            let allItems = Object.keys(productCatalog);
            if (inventorySearchKeyword) allItems = allItems.filter(itemName => itemName.toLowerCase().includes(inventorySearchKeyword.toLowerCase()));
            
            let filteredItems = [];
            allItems.forEach(itemName => {
                const catalogInfo = productCatalog[itemName];
                const currentStock = (stockMap[itemName] || 0) + (catalogInfo.stockOffset || 0);
                filteredItems.push({ itemName: itemName, currentStock: currentStock, catalogInfo: catalogInfo });
            });
            
            const countDisplay = document.getElementById('inventoryCountDisplay');
            if (countDisplay) countDisplay.innerText = `共 ${filteredItems.length} 个品类`;

            if (currentInventorySort !== 'none') {
                filteredItems.sort((a, b) => currentInventorySort === 'asc' ? a.currentStock - b.currentStock : b.currentStock - a.currentStock);
            }
            
            totalItems = filteredItems.length;
            totalPages = Math.ceil(totalItems / itemsPerPage);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const currentPageItems = filteredItems.slice(startIndex, endIndex);
            
            currentPageItems.forEach(itemObj => {
                const { itemName, currentStock, catalogInfo } = itemObj;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                
                let imgCell = document.createElement('td'); 
                imgCell.className = "img-cell px-6 py-4";
                
                // GitHub Pages 适配：如果本地没有上传过 base64 图片，默认去同级 images 文件夹下找同名 .png 图片
                const imgPath = catalogInfo.image || `./images/${itemName}.png`;
                
                const img = document.createElement('img'); 
                img.src = imgPath;
                img.className = "h-14 w-14 sm:h-12 sm:w-12 object-cover rounded-lg shadow-sm cursor-pointer border border-slate-200 hover:opacity-80 transition-opacity bg-white";
                
                // 找不到图片时的回退（如果 neither base64 nor GitHub folder image exists）
                img.onerror = function() {
                    this.onerror = null; // 防止死循环
                    this.outerHTML = `<div class="h-14 w-14 sm:h-12 sm:w-12 bg-slate-100 rounded-lg flex items-center justify-center text-slate-400 border border-slate-200 shadow-inner"><svg class="w-6 h-6 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`;
                };
                
                img.onclick = function() { openImagePreview(imgPath); };
                imgCell.appendChild(img);

                const stockStyle = currentStock <= 5 ? 'text-red-600 font-extrabold text-base' : 'text-slate-900 font-bold text-base';
                tr.appendChild(imgCell);
                
                const editPencil = isAdmin ? `
                    <button class="edit-icon-btn ml-2 text-slate-300 hover:text-blue-600 hover:bg-blue-50 p-1.5 rounded-full transition-colors focus:outline-none" title="修改">
                        <svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>` : '';

                const nameCell = document.createElement('td');
                nameCell.className = "px-6 py-4 text-sm font-bold text-slate-900";
                nameCell.setAttribute('data-label', '物品名称');
                nameCell.innerHTML = `<div class="flex items-center group"><span>${itemName}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-name-btn') : ''}</div>`;
                if(isAdmin) nameCell.querySelector('.edit-name-btn').onclick = () => editItemName(itemName);
                tr.appendChild(nameCell);
                
                const stockCell = document.createElement('td');
                stockCell.className = `px-6 py-4 text-sm ${stockStyle}`;
                stockCell.setAttribute('data-label', '当前库存');
                stockCell.innerHTML = `<div class="flex items-center"><span>${currentStock}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-stock-btn') : ''}</div>`;
                if(isAdmin) stockCell.querySelector('.edit-stock-btn').onclick = () => editStock(itemName, currentStock);
                tr.appendChild(stockCell);
                
                const unitCell = document.createElement('td');
                unitCell.className = "px-6 py-4 text-sm text-slate-600 font-medium";
                unitCell.setAttribute('data-label', '单位');
                unitCell.innerHTML = `<div class="flex items-center group"><span>${catalogInfo.unit}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-unit-btn') : ''}</div>`;
                if(isAdmin) unitCell.querySelector('.edit-unit-btn').onclick = () => editUnit(itemName, catalogInfo.unit);
                tr.appendChild(unitCell);
                
                if (isAdmin) {
                    const actionCell = document.createElement('td');
                    actionCell.className = "action-cell px-6 py-4 text-sm text-slate-500";
                    actionCell.setAttribute('data-label', '操作管理');
                    actionCell.innerHTML = `
                        <div class="flex space-x-2 w-full justify-end">
                            <button class="text-blue-600 hover:text-white hover:bg-blue-600 font-medium text-xs sm:text-sm focus:outline-none bg-white px-3 sm:px-4 py-2 rounded-lg border border-blue-200 transition-colors shadow-sm" onclick="triggerImageUpload('${encodeURIComponent(itemName)}')">更新照片</button>
                            <button class="text-red-600 hover:text-white hover:bg-red-600 font-medium text-xs sm:text-sm focus:outline-none bg-white px-3 sm:px-4 py-2 rounded-lg border border-red-200 transition-colors shadow-sm" onclick="deleteInventory('${encodeURIComponent(itemName)}')">删除品类</button>
                        </div>
                    `;
                    tr.appendChild(actionCell);
                }
                
                tbody.appendChild(tr);
            });
            renderPagination();
        }
        
        function renderPagination() {
            const paginationContainer = document.getElementById('inventoryPagination');
            if (!paginationContainer) return;
            paginationContainer.innerHTML = '';
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'text-xs sm:text-sm text-slate-500 text-center w-full sm:w-auto font-medium';
            infoDiv.textContent = `显示 ${(currentPage - 1) * itemsPerPage + 1} - ${Math.min(currentPage * itemsPerPage, totalItems)} 条，共 ${totalItems} 条`;
            paginationContainer.appendChild(infoDiv);
            
            const buttonsDiv = document.createElement('div');
            // 手机端让按钮可以换行居中
            buttonsDiv.className = 'flex flex-wrap justify-center sm:justify-end gap-1.5 w-full sm:w-auto';
            
            const prevButton = document.createElement('button');
            prevButton.className = currentPage === 1 ? 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-slate-50 text-slate-400 cursor-not-allowed' : 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 shadow-sm';
            prevButton.textContent = '上一页';
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = function() { if (currentPage > 1) { currentPage--; renderInventory(); } };
            buttonsDiv.appendChild(prevButton);
            
            const pageNumbers = [];
            if (totalPages <= 5) { for (let i = 1; i <= totalPages; i++) pageNumbers.push(i); } 
            else {
                pageNumbers.push(1);
                if (currentPage > 3) pageNumbers.push('...');
                const start = Math.max(2, currentPage - 1);
                const end = Math.min(totalPages - 1, currentPage + 1);
                for (let i = start; i <= end; i++) pageNumbers.push(i);
                if (currentPage < totalPages - 2) pageNumbers.push('...');
                pageNumbers.push(totalPages);
            }
            
            pageNumbers.forEach(num => {
                if (num === '...') {
                    const ellipsis = document.createElement('span'); ellipsis.className = 'px-2 py-1.5 text-sm text-slate-400 flex items-center'; ellipsis.textContent = '...'; buttonsDiv.appendChild(ellipsis);
                } else {
                    const pageButton = document.createElement('button');
                    pageButton.className = currentPage === num ? 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-bold bg-blue-600 text-white shadow-sm' : 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 shadow-sm';
                    pageButton.textContent = num;
                    pageButton.onclick = function() { currentPage = num; renderInventory(); };
                    buttonsDiv.appendChild(pageButton);
                }
            });
            const nextButton = document.createElement('button');
            nextButton.className = currentPage === totalPages ? 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-slate-50 text-slate-400 cursor-not-allowed' : 'px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 shadow-sm';
            nextButton.textContent = '下一页';
            nextButton.disabled = currentPage === totalPages;
            nextButton.onclick = function() { if (currentPage < totalPages) { currentPage++; renderInventory(); } };
            buttonsDiv.appendChild(nextButton);
            paginationContainer.appendChild(buttonsDiv);
        }
        
        function handleInventorySearch() {
            const searchInput = document.getElementById('inventorySearchInput');
            if (searchInput) { inventorySearchKeyword = searchInput.value.trim(); currentPage = 1; renderInventory(); }
        }
        
        async function deleteInventory(itemName) {
            itemName = decodeURIComponent(itemName);
            const confirmed = await showCustomDialog({ title: '确认删除', message: `确定要删除物品 "${itemName}" 吗？\n此操作会删除该物品的所有相关记录，包括出入库明细和图片。`, type: 'confirm' });
            if (confirmed) {
                if (productCatalog[itemName]) delete productCatalog[itemName];
                inventoryData = inventoryData.filter(item => item.itemName !== itemName);
                saveDataToStorage(); renderInventory(); 
                showToast('物品删除成功！');
            }
        }

        async function editStock(itemName, currentStock) {
            const newStockStr = await showCustomDialog({ title: `校准库存: ${itemName}`, message: `直接修改总数不产生明细\n当前系统数量：${currentStock}\n\n请输入实际盘点数量：`, type: 'prompt', defaultValue: currentStock });
            if (newStockStr === null || newStockStr.trim() === '') return; 
            const newStock = parseInt(newStockStr, 10);
            if (isNaN(newStock) || newStock < 0) { await showCustomDialog({ message: '修改失败！请输入 0 或正整数。' }); return; }
            const difference = newStock - currentStock;
            if (difference === 0) return; 
            if (!productCatalog[itemName]) productCatalog[itemName] = { unit: '', image: null, stockOffset: 0 };
            productCatalog[itemName].stockOffset = (productCatalog[itemName].stockOffset || 0) + difference;
            saveDataToStorage(); renderInventory(); showToast(`【${itemName}】库存已直接更新为 ${newStock}！`);
        }

        async function editItemName(oldName) {
            const newName = await showCustomDialog({ title: '修改品名', message: `请输入【${oldName}】的新名称：\n(提示: 修改后所有历史出入库明细的名称也会同步更新)`, type: 'prompt', defaultValue: oldName });
            if (newName === null || newName.trim() === '') return; 
            const trimmedNewName = newName.trim();
            if (trimmedNewName === oldName) return;
            if (productCatalog[trimmedNewName]) { await showCustomDialog({ message: `修改失败！库房里已经有【${trimmedNewName}】了，不能重名。` }); return; }
            const newCatalog = {};
            for (const key in productCatalog) {
                if (key === oldName) newCatalog[trimmedNewName] = productCatalog[oldName];
                else newCatalog[key] = productCatalog[key];
            }
            productCatalog = newCatalog;
            inventoryData.forEach(item => { if (item.itemName === oldName) item.itemName = trimmedNewName; });
            saveDataToStorage(); updateTable(); renderInventory(); showToast(`已重命名为【${trimmedNewName}】！`);
        }

        async function editUnit(itemName, currentUnit) {
            const newUnit = await showCustomDialog({ title: `修改单位: ${itemName}`, message: `请输入【${itemName}】的正确单位：\n(历史明细的单位也会同步更新)`, type: 'prompt', defaultValue: currentUnit });
            if (newUnit === null || newUnit.trim() === '') return; 
            const trimmedNewUnit = newUnit.trim();
            if (trimmedNewUnit === currentUnit) return;
            if (productCatalog[itemName]) productCatalog[itemName].unit = trimmedNewUnit;
            inventoryData.forEach(item => { if (item.itemName === itemName) item.unit = trimmedNewUnit; });
            saveDataToStorage(); updateTable(); renderInventory(); showToast(`【${itemName}】单位已修改为【${trimmedNewUnit}】！`);
        }

        function triggerImageUpload(itemName) {
            currentUploadItemName = decodeURIComponent(itemName);
            document.getElementById('imageUploadInput').click();
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width = Math.round((width * MAX_HEIGHT) / height); height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            compressImage(file, function(base64) {
                productCatalog[currentUploadItemName].image = base64;
                saveDataToStorage(); renderInventory(); showToast(currentUploadItemName + ' 的照片已更新！');
                event.target.value = '';
            });
        }
        
        function previewCatImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            compressImage(file, function(base64) {
                tempCatImageBase64 = base64;
                document.getElementById('catImagePreviewImg').src = base64;
                document.getElementById('catImagePreviewImg').classList.remove('hidden');
                document.getElementById('catImagePlaceholder').classList.add('hidden');
                event.target.value = '';
            });
        }

        function openImagePreview(imgSrc) {
            const modal = document.getElementById('imagePreviewModal');
            document.getElementById('previewImage').src = imgSrc;
            modal.classList.remove('modal-hidden'); modal.classList.add('modal-active');
        }

        function closeImagePreview() {
            const modal = document.getElementById('imagePreviewModal');
            modal.classList.remove('modal-active'); modal.classList.add('modal-hidden');
            setTimeout(() => { document.getElementById('previewImage').src = ''; }, 300);
        }

        function openCategoryModal() {
            document.getElementById('categoryModal').classList.remove('modal-hidden');
            document.getElementById('categoryModal').classList.add('modal-active');
            setTimeout(() => { document.getElementById('catItemName').focus(); }, 100);
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('modal-active');
            document.getElementById('categoryModal').classList.add('modal-hidden');
            document.getElementById('categoryForm').reset();
            tempCatImageBase64 = null;
            document.getElementById('catImagePreviewImg').src = '';
            document.getElementById('catImagePreviewImg').classList.add('hidden');
            document.getElementById('catImagePlaceholder').classList.remove('hidden');
        }

        async function saveCategory() {
            const form = document.getElementById('categoryForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const itemName = document.getElementById('catItemName').value.trim();
            const unit = document.getElementById('catUnit').value.trim();
            const stock = parseInt(document.getElementById('catStock').value, 10);
            if (productCatalog[itemName]) { await showCustomDialog({ message: `操作失败！【${itemName}】已经存在于库存中。` }); return; }
            productCatalog[itemName] = { unit: unit, image: tempCatImageBase64, stockOffset: stock };
            saveDataToStorage(); renderInventory(); 
            closeCategoryModal(); showToast(`新品类【${itemName}】已建档入库！`);
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 200; let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/png'); 
                    const logoEl = document.getElementById('companyLogo');
                    logoEl.src = base64; logoEl.setAttribute('src', base64); 
                    localStorage.setItem('companyLogo', base64); showToast('Logo 更新成功！');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveCompanyName() {
            const name = document.getElementById('companyName').innerText;
            localStorage.setItem('companyName', name);
            showToast('系统名称已保存！');
        }

        const modal = document.getElementById('recordModal');
        function openModal() { modal.classList.remove('modal-hidden'); modal.classList.add('modal-active'); }
        function closeModal() {
            modal.classList.remove('modal-active'); modal.classList.add('modal-hidden');
            document.getElementById('recordForm').reset(); document.getElementById('formDate').value = getTodayString();
            const unitInput = document.getElementById('formUnit'); unitInput.readOnly = false; unitInput.classList.remove('bg-slate-100', 'text-slate-500');
        }

        async function saveRecord(keepOpen = false) {
            const form = document.getElementById('recordForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const type = document.getElementById('formType').value;
            const itemName = document.getElementById('formItemName').value.trim();
            const quantity = parseInt(document.getElementById('formQuantity').value, 10);
            if (type === '出库') {
                let currentStock = productCatalog[itemName] ? (productCatalog[itemName].stockOffset || 0) : 0;
                inventoryData.forEach(item => {
                    if (item.itemName === itemName) {
                        if (item.type === '入库') currentStock += item.quantity;
                        else if (item.type === '出库') currentStock -= item.quantity;
                    }
                });
                if (!productCatalog[itemName] || currentStock <= 0) { await showCustomDialog({ message: `出库失败！\n库存中没有【${itemName}】，请先建档或入库。` }); return; }
                if (currentStock < quantity) { await showCustomDialog({ message: `库存不足！\n【${itemName}】当前仅剩 ${currentStock}，无法出库 ${quantity}。` }); return; }
            }
            const newRecord = {
                id: inventoryData.length > 0 ? Math.max(...inventoryData.map(d => d.id)) + 1 : 1,
                date: document.getElementById('formDate').value, type: type, itemName: itemName, quantity: quantity,
                unit: document.getElementById('formUnit').value, handler: document.getElementById('formHandler').value, remarks: document.getElementById('formRemarks').value
            };
            inventoryData.unshift(newRecord);
            if (!productCatalog[newRecord.itemName]) productCatalog[newRecord.itemName] = { unit: newRecord.unit, image: null, stockOffset: 0 };
            saveDataToStorage(); document.getElementById('searchInput').value = ''; currentSearchKeyword = ''; updateTable();
            if (!document.getElementById('inventoryView').classList.contains('hidden')) renderInventory();
            if (keepOpen) {
                showToast(`已保存！请继续录入下一个。`);
                document.getElementById('formItemName').value = ''; document.getElementById('formQuantity').value = ''; document.getElementById('formRemarks').value = '';
                const unitInput = document.getElementById('formUnit'); unitInput.value = ''; unitInput.readOnly = false; unitInput.classList.remove('bg-slate-100', 'text-slate-500');
                document.getElementById('formItemName').focus();
            } else { closeModal(); showToast('记录添加成功！'); }
        }

        async function exportToExcel() {
            if(inventoryData.length === 0) { await showCustomDialog({ message: "当前没有可导出的数据！" }); return; }
            // 这里为了导出完整数据，我们需要暂时移除卡片模式的影响，可以直接构建一个纯数据工作表
            const wsData = [["序号", "日期", "物品名称", "操作类型", "数量", "单位", "经办人", "备注"]];
            currentViewData.forEach((item, idx) => {
                wsData.push([idx + 1, item.date, item.itemName, item.type, item.quantity, item.unit, item.handler, item.remarks || ""]);
            });
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "出入库明细");
            const dateStr = getTodayString().replace(/-/g, '');
            XLSX.writeFile(wb, `办公用品明细_${dateStr}.xlsx`);
            showToast('Excel 文件导出成功！');
        }

        function exportStandaloneApp() {
            const clonedDoc = document.cloneNode(true);
            const dataScript = clonedDoc.getElementById('embedded-data');
            if (dataScript) dataScript.textContent = `window.__EMBEDDED_DATA__ = { inventoryData: ${JSON.stringify(inventoryData)}, productCatalog: ${JSON.stringify(productCatalog)} };`;
            const nameSpan = clonedDoc.getElementById('companyName');
            if (nameSpan) nameSpan.innerText = document.getElementById('companyName').innerText;
            const clonedLogo = clonedDoc.getElementById('companyLogo');
            if (clonedLogo) clonedLogo.setAttribute('src', document.getElementById('companyLogo').src);
            const htmlContent = '<!DOCTYPE html>\n<html lang="zh-CN">\n' + clonedDoc.documentElement.innerHTML + '\n</html>';
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
            a.download = `港坤系统_独立分享版_${getTodayString().replace(/-/g, '')}.html`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('打包成功！已生成包含最新数据的离线版本！');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }
    </script>

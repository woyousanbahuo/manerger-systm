<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="renderer" content="webkit">
    <meta name="force-rendering" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>办公用品库房出入库管理</title>

    <!-- 彻底移除所有外部数据库 SDK，使用原生 Fetch API 实现极致轻量级云同步 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft YaHei", Tahoma, Simsun, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        input[type="date"], input[type="text"], input[type="number"], input[type="password"], select, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f1f1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-hidden { display: none; opacity: 0; pointer-events: none; }
        .modal-active { display: flex; opacity: 1; pointer-events: auto; }
        .transition-opacity { transition: opacity 0.3s ease; }
        [contenteditable] { user-select: text; outline: none; }

        /* 权限控制核心 CSS */
        body:not(.is-admin) .admin-only {
            display: none !important;
        }

        /* ================= 移动端原生 App 级神仙适配 ================= */
        @media (max-width: 768px) {
            .responsive-table-wrapper { border: none !important; box-shadow: none !important; background: transparent !important; }
            .responsive-table { border: none !important; box-shadow: none !important; }
            .responsive-table thead { display: none; }
            .responsive-table tbody { display: flex; flex-direction: column; gap: 1rem; padding-bottom: 1.5rem; }
            
            /* 出入库明细：重构为最稳固的 Grid 布局，绝不错位 */
            #tableBody tr {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                background-color: #ffffff;
                border-radius: 1rem;
                box-shadow: 0 4px 15px -3px rgba(0,0,0,0.08);
                border: 1px solid #f1f5f9;
                padding: 1.25rem;
                align-items: center;
            }
            #tableBody td { border: none !important; padding: 0 !important; display: flex; align-items: center; }
            #tableBody td::before { content: none !important; } 
            #tableBody td.td-index, #tableBody td.td-unit { display: none; }
            
            #tableBody td.td-checkbox { grid-column: 1 / 3; margin-bottom: 0.25rem; }
            #tableBody td.td-name { grid-column: 1; font-size: 1.15rem; font-weight: 800; color: #0f172a; line-height: 1.3; }
            #tableBody td.td-type { grid-column: 2; justify-content: flex-end; align-items: flex-start; }
            #tableBody td.td-qty { grid-column: 1 / 3; font-size: 1.75rem; font-weight: 900; color: #4f46e5; margin: 0.25rem 0; align-items: baseline; }
            #tableBody td.td-qty::before { content: '变动:'; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-right: 0.4rem; }
            #tableBody td.td-qty::after { content: attr(data-unit); font-size: 0.9rem; font-weight: 600; color: #64748b; margin-left: 0.2rem; }
            #tableBody td.td-date { grid-column: 1; font-size: 0.85rem; color: #64748b; border-bottom: 1px dashed #e2e8f0; padding-bottom: 0.75rem !important; }
            #tableBody td.td-date::before { content: '日期: '; margin-right: 0.25rem; }
            #tableBody td.td-handler { grid-column: 2; justify-content: flex-end; font-size: 0.9rem; font-weight: 800; color: #1e293b; border-bottom: 1px dashed #e2e8f0; padding-bottom: 0.75rem !important; }
            #tableBody td.td-handler::before { content: '经办: '; font-weight: normal; font-size: 0.8rem; color: #94a3b8; margin-right: 0.25rem; }
            #tableBody td.td-remarks { grid-column: 1 / 3; background: #f8fafc; padding: 0.75rem !important; border-radius: 0.5rem; margin-top: 0.5rem; font-size: 0.85rem; color: #475569; line-height: 1.4; }
            #tableBody td.td-remarks::before { content: '备注: '; color: #94a3b8; font-weight: 700; margin-right: 0.25rem; }
            #tableBody td.action-cell { grid-column: 1 / 3; justify-content: flex-end; padding-top: 0.5rem !important; }

            /* 当前库存：清爽左右分栏卡片设计 */
            #inventoryBody tr {
                display: flex; flex-wrap: wrap; align-items: center; align-content: center;
                background-color: #ffffff; border-radius: 1rem;
                box-shadow: 0 4px 15px -3px rgba(0,0,0,0.08);
                border: 1px solid #f1f5f9; padding: 1rem; margin-bottom: 1rem;
            }
            #inventoryBody td { border: none !important; padding: 0 !important; display: flex; align-items: center; justify-content: flex-start; text-align: left; }
            #inventoryBody td::before { content: none !important; }
            #inventoryBody td.img-cell { width: 4.5rem; height: 4.5rem; flex-shrink: 0; margin-right: 1rem; }
            #inventoryBody td.img-cell img, #inventoryBody td.img-cell .bg-slate-100 { width: 100%; height: 100%; border-radius: 0.75rem; box-shadow: 0 4px 10px rgba(0,0,0,0.08); object-fit: cover; }
            #inventoryBody td[data-label="物品名称"] { width: calc(100% - 5.5rem); font-size: 1.15rem; font-weight: 900; color: #0f172a; margin-bottom: 0.25rem; }
            #inventoryBody td[data-label="当前库存"] { width: calc(100% - 5.5rem); margin-left: 5.5rem; font-size: 1.25rem; font-weight: 900; color: #4f46e5; }
            #inventoryBody td[data-label="当前库存"] span:first-child::before { content: '余量: '; font-size: 0.85rem; color: #64748b; font-weight: 600; margin-right: 0.4rem; }
            #inventoryBody td[data-label="当前库存"] span:first-child::after { content: attr(data-unit); font-size: 0.85rem; color: #64748b; font-weight: 600; margin-left: 0.2rem; }
            #inventoryBody td[data-label="单位"] { display: none; }
            #inventoryBody td.action-cell { width: 100%; justify-content: flex-end; padding-top: 1rem !important; margin-top: 0.5rem; border-top: 1px dashed #e2e8f0 !important; }
        }
    </style>
    <script id="embedded-data">window.__EMBEDDED_DATA__ = null;</script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen relative">

    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between min-h-[4rem] sm:h-20 py-2 sm:py-0">
                <!-- 左侧 Logo 与标题 -->
                <div class="flex items-center flex-1 pr-2">
                    <input type="file" id="logoUploadInput" accept="image/*" class="hidden" onchange="handleLogoUpload(event)">
                    <!-- 终极防裂图机制：优先找根目录 Logo.svg，其次找 images/Logo.svg，失败使用原生代码图标 -->
                    <img id="companyLogo" src="./Logo.svg" onerror="if(this.getAttribute('data-retried') !== 'true') { this.setAttribute('data-retried', 'true'); this.src='./images/Logo.svg'; } else { this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIGZpbGw9Im5vbmUiIHZpZXdib3g9IjAgMCAyNCAyNCIgc3Ryb2tlPSIjMGYxNzJhIj48cGF0aCBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiIHN0cm9rZS13aWR0aD0iMiIgZD0iTTE5IDIxVjVhMiAyIDAgMDAtMi0ySDdhMiAyIDAgMDAtMiAydjE2bTE0IDBoMm0tMiAwaC01bS05IDBIM20yIDBoNU05IDdoMW0tMSA0aDFtNC00aDFtLTEgNGgxbS01IDEwdi01YTEgMSAwIDAxMS0xaDJhMSAxIDAgMDExIDF2NW0tNCAwaDQiLz48L3N2Zz4='; }" alt="公司Logo" onclick="triggerLogoUpload()" class="h-10 w-10 sm:h-12 sm:w-12 mr-2.5 sm:mr-4 flex-shrink-0 rounded-xl bg-slate-50 object-contain shadow-sm cursor-pointer hover:opacity-80 transition-opacity p-1 border border-slate-100" title="点击更换Logo">
                    <span id="companyName" class="font-extrabold text-[15px] sm:text-2xl leading-tight line-clamp-2 break-words cursor-text border-b-2 border-transparent hover:border-slate-300 focus:border-indigo-500 focus:outline-none transition-colors text-slate-900" contenteditable="false" onblur="saveCompanyName()" title="管理员可修改系统名称">港坤公司办公用品管理系统</span>
                </div>
                
                <!-- 右侧操作区 -->
                <div class="flex items-center gap-1.5 sm:gap-3 flex-shrink-0">
                    <button id="navLoginBtn" onclick="openAuthModal('login')" class="flex items-center px-3 py-1.5 sm:px-4 sm:py-2 bg-slate-900 hover:bg-slate-800 rounded-xl text-xs sm:text-sm font-semibold transition-all shadow-md text-white">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                        <span class="hidden sm:inline">管理登录</span>
                    </button>
                    <button id="navChangePwdBtn" onclick="openAuthModal('changePwd')" class="hidden flex items-center px-3 py-1.5 sm:px-4 sm:py-2 bg-white hover:bg-slate-50 rounded-xl text-xs sm:text-sm font-semibold transition-all shadow-sm border border-slate-200 text-slate-700" title="修改管理密码">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
                        <span class="hidden sm:inline">密码</span>
                    </button>
                    
                    <!-- 状态指示灯：云同步正常 vs 单机模式 -->
                    <button id="cloudSyncIndicator" class="hidden flex items-center px-3 py-1.5 sm:px-4 sm:py-2 bg-emerald-50 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-sm border border-emerald-100 text-emerald-600" title="已成功连接云端数据库">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        <span class="hidden sm:inline">云同步正常</span>
                    </button>
                    <button id="localModeIndicator" class="hidden flex items-center px-3 py-1.5 sm:px-4 sm:py-2 bg-amber-50 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-sm border border-amber-200 text-amber-600" title="未配置云端，当前数据仅保存在本地浏览器">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <span class="hidden sm:inline">单机模式</span>
                    </button>

                    <button id="navLogoutBtn" onclick="logoutAdmin()" class="hidden flex items-center px-3 py-1.5 sm:px-4 sm:py-2 bg-red-50 hover:bg-red-100 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-sm border border-red-100 text-red-600">
                        <svg class="w-4 h-4 sm:mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        <span class="hidden sm:inline">退出</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-8">
        
        <!-- 导航切换 -->
        <div class="border-b border-slate-200 mb-6 sm:mb-8">
            <nav class="-mb-px flex w-full" aria-label="Tabs">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="flex-1 sm:flex-none text-center border-indigo-600 text-indigo-600 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-extrabold text-sm sm:text-base transition-colors">当前库存展示</button>
                <button onclick="switchTab('transactions')" id="tab-transactions" class="flex-1 sm:flex-none text-center border-transparent text-slate-400 hover:text-slate-800 hover:border-slate-300 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-bold text-sm sm:text-base transition-colors">出入库明细</button>
            </nav>
        </div>

        <!-- ======================= 库存视图 (默认展示) ======================= -->
        <div id="inventoryView">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-5 gap-3 sm:gap-4">
                <div class="flex items-center gap-3 w-full sm:w-auto">
                    <div class="relative w-full sm:w-80">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                        <input type="text" id="inventorySearchInput" placeholder="快速搜索名称..." class="block w-full pl-11 pr-4 py-3 sm:py-2.5 border-2 border-indigo-100 bg-indigo-50/40 rounded-2xl leading-5 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-sm font-bold transition duration-200 shadow-sm text-slate-800" oninput="handleInventorySearch()">
                    </div>
                    <span id="inventoryCountDisplay" class="text-xs sm:text-sm font-bold text-slate-600 bg-white px-3 sm:px-4 py-2 sm:py-1.5 rounded-xl whitespace-nowrap border-2 border-slate-100 shadow-sm hidden sm:block">共 0 个品类</span>
                </div>
                <button onclick="openCategoryModal()" class="admin-only w-full sm:w-auto justify-center flex items-center px-4 py-3 sm:py-2.5 bg-indigo-600 border border-transparent rounded-2xl sm:rounded-xl shadow-md text-sm font-bold text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    <svg class="-ml-1 mr-1.5 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    直接建档入库
                </button>
            </div>
            
            <div class="bg-transparent sm:bg-white sm:rounded-2xl sm:shadow-sm sm:border sm:border-slate-200 overflow-hidden responsive-table-wrapper">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 responsive-table">
                        <thead class="bg-slate-50">
                            <tr>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">物品图片</th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">物品名称</th>
                                <th scope="col" onclick="toggleInventorySort()" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider cursor-pointer hover:bg-slate-200 transition-colors select-none group" title="默认按活跃度排序，点击可按库存数量排序">
                                    <div class="flex items-center">
                                        当前库存
                                        <span id="inventorySortIcon" class="ml-1 text-indigo-400 group-hover:text-indigo-600">
                                            <svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                        </span>
                                    </div>
                                </th>
                                <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">单位</th>
                                <th scope="col" class="admin-only px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody" class="bg-transparent sm:bg-white sm:divide-y sm:divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ======================= 出入库视图 ======================= -->
        <div id="transactionsView" class="hidden">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-5 gap-3 sm:gap-4">
                
                <div class="flex flex-col sm:flex-row w-full lg:w-auto gap-3">
                    <div class="relative w-full sm:w-80">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="搜索明细、经办人..." class="block w-full pl-11 pr-4 py-3 sm:py-2.5 border-2 border-indigo-100 bg-indigo-50/40 rounded-2xl leading-5 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white text-sm font-bold transition duration-200 shadow-sm text-slate-800">
                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <input type="date" id="startDate" onchange="handleDateFilter()" class="flex-1 sm:flex-none block w-full px-2 py-3 sm:py-2.5 border-2 sm:border border-slate-200 rounded-2xl sm:rounded-xl leading-5 bg-white text-slate-700 font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition duration-150 ease-in-out shadow-sm" title="开始日期">
                        <span class="text-slate-400 text-xs font-bold">至</span>
                        <input type="date" id="endDate" onchange="handleDateFilter()" class="flex-1 sm:flex-none block w-full px-2 py-3 sm:py-2.5 border-2 sm:border border-slate-200 rounded-2xl sm:rounded-xl leading-5 bg-white text-slate-700 font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition duration-150 ease-in-out shadow-sm" title="结束日期">
                    </div>
                </div>

                <div class="flex w-full sm:w-auto gap-2 sm:gap-3 flex-wrap admin-only">
                    <button onclick="deleteSelected()" id="batchDeleteBtn" disabled class="flex-1 sm:flex-none flex items-center justify-center px-3 py-3 sm:py-2.5 bg-red-600 border border-transparent rounded-2xl sm:rounded-xl shadow-sm text-sm font-bold text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        删除 (<span id="selectedCount">0</span>)
                    </button>
                    <button onclick="openModal()" class="flex-1 sm:flex-none flex items-center justify-center px-3 py-3 sm:py-2.5 bg-blue-600 border border-transparent rounded-2xl sm:rounded-xl shadow-md text-sm font-bold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        入/出库记录
                    </button>
                    <button onclick="exportToExcel()" class="flex-1 sm:flex-none flex items-center justify-center px-3 py-3 sm:py-2.5 bg-emerald-600 border border-transparent rounded-2xl sm:rounded-xl shadow-sm text-sm font-bold text-white hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                        <svg class="-ml-1 mr-1.5 h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        导出Excel
                    </button>
                </div>
            </div>

    <script>
        /* =========================================================================
         * 🚀 终极数据库配置区 (替换为 JSONBin.io 的信息)
         * 免注册直连: https://jsonbin.io/ (国内免翻墙直连，支持 GitHub 一键登录)
         * ========================================================================= */
        
        // 步骤1: 登录 jsonbin.io，点击 "Create Bin"，存入空大括号 "{}" 并保存。获取 Bin ID。
        // 步骤2: 点击左侧 "API Keys"，获取 Master Key。把它们填在下面。
        const JSONBIN_BIN_ID = '69e1e417856a682189430290';
        const JSONBIN_API_KEY = '$2a$10$C11DanQnGAZV0TJsaSG3k.1X9VTBkmcL6Gffh1RbYjhMNSOaPmNNC';
        
        // =========================================================================
        
        let inventoryData = [];
        let productCatalog = {};
        let isAdmin = false; 
        const isCloudEnabled = JSONBIN_BIN_ID !== '你的Bin ID';

        /* UI 工具：自定义弹窗 */
        function showCustomDialog({ title = '提示', message, type = 'alert', defaultValue = '' }) {
            return new Promise((resolve) => {
                const dialog = document.getElementById('customDialog');
                const titleEl = document.getElementById('dialogTitle');
                const messageEl = document.getElementById('dialogMessage');
                const inputEl = document.getElementById('dialogInput');
                const cancelBtn = document.getElementById('dialogCancelBtn');
                const confirmBtn = document.getElementById('dialogConfirmBtn');

                titleEl.innerText = title;
                messageEl.innerHTML = message.replace(/\n/g, '<br>');
                inputEl.value = defaultValue;

                inputEl.classList.add('hidden');
                cancelBtn.classList.add('hidden');
                
                if (type === 'prompt') {
                    inputEl.classList.remove('hidden');
                    cancelBtn.classList.remove('hidden');
                } else if (type === 'confirm') {
                    cancelBtn.classList.remove('hidden');
                }

                dialog.classList.remove('hidden');
                dialog.classList.add('flex');
                if (type === 'prompt') setTimeout(() => inputEl.focus(), 100);

                const cleanup = () => {
                    dialog.classList.add('hidden');
                    dialog.classList.remove('flex');
                    cancelBtn.onclick = null;
                    confirmBtn.onclick = null;
                };

                cancelBtn.onclick = () => { cleanup(); resolve(null); };
                confirmBtn.onclick = () => {
                    cleanup();
                    if (type === 'prompt') resolve(inputEl.value);
                    else if (type === 'confirm') resolve(true);
                    else resolve(true);
                };
            });
        }

        let itemsPerPage = window.innerWidth <= 768 ? 4 : 10;
        window.addEventListener('resize', () => {
            const newItemsPerPage = window.innerWidth <= 768 ? 4 : 10;
            if (newItemsPerPage !== itemsPerPage) {
                itemsPerPage = newItemsPerPage;
                currentPage = 1;
                if (!document.getElementById('inventoryView').classList.contains('hidden')) renderInventory();
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            if (isCloudEnabled) {
                syncFromCloud();
            } else {
                showCustomDialog({
                    title: '⚠️ 需配置云端数据库',
                    message: '系统检测到您尚未配置 JSONBin.io 数据桶。\n\n目前系统已降级为【单机模式】（数据仅保存在当前设备浏览器缓存）。\n\n【开启完美全端同步步骤】：\n1. 访问 https://jsonbin.io/ 使用您的 GitHub 一键登录\n2. 点击 "+ Create Bin"，输入 "{}" 并保存，复制 Bin ID\n3. 在左侧 API Keys 复制 Master Key\n4. 将这两个值填入本页面代码最上方的配置区！',
                    type: 'alert'
                });
                document.getElementById('localModeIndicator').classList.remove('hidden');
                initFallbackData();
            }
            
            setAdminStatus(false); 
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            switchTab('inventory');
        });
        
        // 核心：使用原生 Fetch 从 JSONBin 拉取数据 (告别所有被墙的 SDK)
        async function syncFromCloud() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('网络请求失败');
                
                const data = await response.json();
                const storeData = data.record;

                // 如果云端有数据则覆盖本地
                if (storeData && storeData.inventoryData) {
                    inventoryData = storeData.inventoryData;
                    productCatalog = storeData.productCatalog || {};
                    
                    if (storeData.adminPassword) localStorage.setItem('adminPassword', storeData.adminPassword);
                    if (storeData.companyName) document.getElementById('companyName').innerText = storeData.companyName;
                    
                    if(isAdmin) {
                        document.getElementById('cloudSyncIndicator').classList.remove('hidden');
                        document.getElementById('localModeIndicator').classList.add('hidden');
                    }
                    
                    updateTable();
                    if (!document.getElementById('inventoryView').classList.contains('hidden')) renderInventory();
                } else {
                    // 云端是空的，把本地的推送上去
                    initFallbackData();
                    saveDataToCloud(); 
                }
            } catch (error) {
                console.error("Cloud sync failed:", error);
                if(isAdmin) {
                    document.getElementById('cloudSyncIndicator').classList.add('hidden');
                    document.getElementById('localModeIndicator').classList.remove('hidden');
                }
                if(inventoryData.length === 0) initFallbackData();
            }
        }

        // 核心：使用原生 Fetch 保存数据到 JSONBin
        async function saveDataToCloud() {
            if (!isCloudEnabled) {
                // 单机模式本地保存
                localStorage.setItem('inventoryData_v10', JSON.stringify(inventoryData));
                localStorage.setItem('productCatalog_v10', JSON.stringify(productCatalog));
                return;
            }
            
            const dataToSave = {
                inventoryData: inventoryData,
                productCatalog: productCatalog,
                adminPassword: localStorage.getItem('adminPassword') || '123456',
                companyName: document.getElementById('companyName').innerText
            };
            
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(dataToSave)
                });
                
                if (!response.ok) throw new Error('保存失败');
                console.log("Push to cloud success.");
            } catch (error) {
                console.error("Save to cloud failed:", error);
                showToast('同步失败，请检查网络');
            }
        }

        let authMode = 'login';
        function openAuthModal(mode) {
            authMode = mode;
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const hint = document.getElementById('authHint');
            const oldPwdGroup = document.getElementById('oldPwdGroup');
            const mainLabel = document.getElementById('mainPwdLabel');
            const submitBtn = document.getElementById('authSubmitBtn');
            
            document.getElementById('authForm').reset();

            if (mode === 'login') {
                title.innerText = '管理员登录';
                oldPwdGroup.classList.add('hidden');
                document.getElementById('authOldPwd').removeAttribute('required');
                mainLabel.innerText = '管理密码';
                hint.classList.remove('hidden');
                submitBtn.innerText = '安全验证并登录';
            } else {
                title.innerText = '修改管理密码';
                oldPwdGroup.classList.remove('hidden');
                document.getElementById('authOldPwd').setAttribute('required', 'true');
                mainLabel.innerText = '新密码';
                hint.classList.add('hidden');
                submitBtn.innerText = '确认修改';
            }

            modal.classList.remove('modal-hidden');
            modal.classList.add('modal-active');
            setTimeout(() => {
                document.getElementById(mode === 'login' ? 'authMainPwd' : 'authOldPwd').focus();
            }, 100);
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('modal-active');
            document.getElementById('authModal').classList.add('modal-hidden');
        }

        async function handleAuthSubmit(event) {
            event.preventDefault();
            const savedPwd = localStorage.getItem('adminPassword') || '123456';
            const mainPwd = document.getElementById('authMainPwd').value;

            if (authMode === 'login') {
                if (mainPwd === savedPwd) {
                    setAdminStatus(true);
                    closeAuthModal();
                    showToast('登录成功！已进入管理模式。');
                } else {
                    await showCustomDialog({ title: '验证失败', message: '密码输入错误！请重试。' });
                }
            } else if (authMode === 'changePwd') {
                const oldPwd = document.getElementById('authOldPwd').value;
                if (oldPwd !== savedPwd) {
                    await showCustomDialog({ title: '修改失败', message: '原密码验证错误！' });
                    return;
                }
                if (mainPwd.trim() === '') {
                    await showCustomDialog({ title: '修改失败', message: '新密码不能为空！' });
                    return;
                }
                localStorage.setItem('adminPassword', mainPwd);
                saveDataToCloud(); 
                closeAuthModal();
                showToast('密码修改成功！下次请使用新密码。');
            }
        }

        function populateItemDropdown(filterText) {
            const dropdown = document.getElementById('itemDropdown');
            dropdown.innerHTML = '';
            const items = Object.keys(productCatalog);
            let matchCount = 0;
            items.forEach(itemName => {
                if (itemName.toLowerCase().includes(filterText.toLowerCase())) {
                    const li = document.createElement('li');
                    li.className = "px-4 py-3 sm:py-2 hover:bg-indigo-50 hover:text-indigo-700 font-medium cursor-pointer text-sm text-slate-700 border-b border-slate-50 last:border-0 transition-colors";
                    li.innerText = itemName;
                    li.onclick = function() {
                        document.getElementById('formItemName').value = itemName;
                        dropdown.classList.add('hidden');
                        handleItemNameInput(); 
                    };
                    dropdown.appendChild(li);
                    matchCount++;
                }
            });
            return matchCount > 0;
        }
        document.addEventListener('click', function(event) {
            const inputDiv = document.getElementById('formItemName')?.parentElement;
            if (inputDiv && !inputDiv.contains(event.target)) document.getElementById('itemDropdown')?.classList.add('hidden');
        });
        function handleItemNameInput() {
            const itemName = document.getElementById('formItemName').value.trim();
            const unitInput = document.getElementById('formUnit');
            if (productCatalog[itemName]) {
                unitInput.value = productCatalog[itemName].unit;

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            
            updateSelectAllCheckboxState();

            if (data.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                tbody.parentElement.classList.add('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                tbody.parentElement.classList.remove('hidden');
            }

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-50 transition-colors`;
                const typeStyle = item.type === '入库' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';
                const isSelected = selectedIds.has(item.id);
                
                let html = '';
                if (isAdmin) {
                    html += `
                    <td class="td-checkbox">
                        <input type="checkbox" value="${item.id}" onchange="toggleSelectRow(event, ${item.id})" ${isSelected ? 'checked' : ''} class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 cursor-pointer w-5 h-5">
                    </td>`;
                }
                
                html += `
                    <td class="td-index">${index + 1}</td>
                    <td class="td-name">${item.itemName}</td>
                    <td class="td-type"><span class="px-2.5 py-1 inline-flex text-xs leading-5 font-bold rounded-lg shadow-sm ${typeStyle}">${item.type}</span></td>
                    <td data-unit="${item.unit}" class="td-qty">${item.quantity}</td>
                    <td class="td-unit">${item.unit}</td>
                    <td class="td-date">${item.date}</td>
                    <td class="td-handler">${item.handler}</td>
                    <td class="td-remarks"><span class="truncate max-w-[150px] sm:max-w-xs">${item.remarks || '-'}</span></td>
                `;

                if (isAdmin) {
                    html += `
                    <td class="action-cell">
                        <button onclick="deleteSingle(${item.id})" class="text-rose-500 hover:text-white hover:bg-rose-500 px-4 py-2 rounded-xl font-bold focus:outline-none transition-colors border border-rose-200 hover:border-transparent text-sm shadow-sm">删除此明细</button>
                    </td>`;
                }
                
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function toggleSelectRow(event, id) {
            if (event.target.checked) selectedIds.add(id);
            else selectedIds.delete(id);
            updateBatchDeleteBtn();
            updateSelectAllCheckboxState();
        }

            const isChecked = event.target.checked;

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');

                    tableContainer.appendChild(paginationDiv);
                    paginationContainer = document.getElementById('inventoryPagination');
                }
            }
            
            tbody.innerHTML = '';
            let stockMap = {};
            let frequencyMap = {}; 

            inventoryData.forEach(item => {
                if (!stockMap[item.itemName]) stockMap[item.itemName] = 0;
                if (item.type === '入库') stockMap[item.itemName] += item.quantity;
                else if (item.type === '出库') stockMap[item.itemName] -= item.quantity;
                
                if (item.handler !== '系统初始化') {
                    frequencyMap[item.itemName] = (frequencyMap[item.itemName] || 0) + 1;
                }
            });
            let allItems = Object.keys(productCatalog);
            if (inventorySearchKeyword) allItems = allItems.filter(itemName => itemName.toLowerCase().includes(inventorySearchKeyword.toLowerCase()));
            
            let filteredItems = [];
            allItems.forEach(itemName => {
                const catalogInfo = productCatalog[itemName];
                const currentStock = (stockMap[itemName] || 0) + (catalogInfo.stockOffset || 0);
                filteredItems.push({ itemName: itemName, currentStock: currentStock, catalogInfo: catalogInfo });
            });
            
            const countDisplay = document.getElementById('inventoryCountDisplay');
            if (countDisplay) countDisplay.innerText = `共 ${filteredItems.length} 个品类`;

            if (currentInventorySort === 'none') {
                filteredItems.sort((a, b) => {
                    const freqA = frequencyMap[a.itemName] || 0;
                    const freqB = frequencyMap[b.itemName] || 0;
                    if (freqA !== freqB) return freqB - freqA;
                    return b.currentStock - a.currentStock;
                });
            } else {
                filteredItems.sort((a, b) => currentInventorySort === 'asc' ? a.currentStock - b.currentStock : b.currentStock - a.currentStock);
            }
            
            totalItems = filteredItems.length;
            totalPages = Math.ceil(totalItems / itemsPerPage);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            
            const startIndex = (currentPage - 1) * itemsPerPage;

                img.onerror = function() {
                    this.onerror = null; 
                    this.outerHTML = `<div class="h-16 w-16 sm:h-12 sm:w-12 bg-slate-50 rounded-xl flex items-center justify-center text-slate-300 border border-slate-200 shadow-inner"><svg class="w-6 h-6 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg></div>`;
                };
                
                img.onclick = function() { openImagePreview(imgPath); };
                imgCell.appendChild(img);

                const stockStyle = currentStock <= 5 ? 'text-rose-600 font-extrabold text-lg' : 'text-slate-900 font-bold text-lg';
                tr.appendChild(imgCell);
                
                const editPencil = isAdmin ? `
                    <button class="edit-icon-btn ml-2 text-slate-300 hover:text-indigo-600 hover:bg-indigo-50 p-1.5 rounded-full transition-colors focus:outline-none" title="修改">
                        <svg class="w-4 h-4 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    </button>` : '';

                const nameCell = document.createElement('td');
                nameCell.className = "px-6 py-4 text-base font-extrabold text-slate-900";
                nameCell.setAttribute('data-label', '物品名称');
                nameCell.innerHTML = `<div class="flex items-center group"><span class="truncate">${itemName}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-name-btn') : ''}</div>`;
                if(isAdmin) nameCell.querySelector('.edit-name-btn').onclick = () => editItemName(itemName);
                tr.appendChild(nameCell);
                
                const stockCell = document.createElement('td');
                stockCell.className = `px-6 py-4 text-sm ${stockStyle}`;
                stockCell.setAttribute('data-label', '当前库存');
                stockCell.innerHTML = `<div class="flex items-center"><span>${currentStock}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-stock-btn') : ''}</div>`;
                if(isAdmin) stockCell.querySelector('.edit-stock-btn').onclick = () => editStock(itemName, currentStock);
                tr.appendChild(stockCell);
                
                const unitCell = document.createElement('td');
                unitCell.className = "px-6 py-4 text-sm text-slate-500 font-medium";
                unitCell.setAttribute('data-label', '单位');
                unitCell.innerHTML = `<div class="flex items-center group"><span>${catalogInfo.unit}</span>${isAdmin ? editPencil.replace('edit-icon-btn', 'edit-unit-btn') : ''}</div>`;
                if(isAdmin) unitCell.querySelector('.edit-unit-btn').onclick = () => editUnit(itemName, catalogInfo.unit);
                tr.appendChild(unitCell);
                
                if (isAdmin) {
                    const actionCell = document.createElement('td');
                    actionCell.className = "action-cell px-6 py-4 text-sm text-slate-500";
                    actionCell.setAttribute('data-label', '操作管理');
                    actionCell.innerHTML = `
                        <div class="flex space-x-2 w-full justify-end">
                            <button class="text-indigo-600 hover:text-white hover:bg-indigo-600 font-bold text-xs sm:text-sm focus:outline-none bg-white px-3 sm:px-4 py-2.5 rounded-xl border border-indigo-200 transition-colors shadow-sm" onclick="triggerImageUpload('${encodeURIComponent(itemName)}')">更新照片</button>
                            <button class="text-rose-600 hover:text-white hover:bg-rose-600 font-bold text-xs sm:text-sm focus:outline-none bg-white px-3 sm:px-4 py-2.5 rounded-xl border border-rose-200 transition-colors shadow-sm" onclick="deleteInventory('${encodeURIComponent(itemName)}')">删除品类</button>
                        </div>
                    `;
                    tr.appendChild(actionCell);
                }
                
                tbody.appendChild(tr);
            });
            renderPagination();
        }
        
        function renderPagination() {
            const paginationContainer = document.getElementById('inventoryPagination');
            if (!paginationContainer) return;
            paginationContainer.innerHTML = '';
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'text-xs sm:text-sm text-slate-500 text-center w-full sm:w-auto font-bold tracking-wide';
            infoDiv.textContent = `显示 ${(currentPage - 1) * itemsPerPage + 1} - ${Math.min(currentPage * itemsPerPage, totalItems)} 条，共 ${totalItems} 条`;
            paginationContainer.appendChild(infoDiv);
            
            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'flex flex-wrap justify-center sm:justify-end gap-1.5 w-full sm:w-auto';
            
            const prevButton = document.createElement('button');
            prevButton.className = currentPage === 1 ? 'px-4 py-2 rounded-xl text-xs sm:text-sm font-bold bg-slate-50 text-slate-300 cursor-not-allowed' : 'px-4 py-2 rounded-xl text-xs sm:text-sm font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 shadow-sm transition-colors';
            prevButton.textContent = '上一页';
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = function() { if (currentPage > 1) { currentPage--; renderInventory(); } };
            buttonsDiv.appendChild(prevButton);
            
            const pageNumbers = [];
            if (totalPages <= 5) { for (let i = 1; i <= totalPages; i++) pageNumbers.push(i); } 
            else {
                pageNumbers.push(1);
                if (currentPage > 3) pageNumbers.push('...');
                const start = Math.max(2, currentPage - 1);
                const end = Math.min(totalPages - 1, currentPage + 1);
                for (let i = start; i <= end; i++) pageNumbers.push(i);
                if (currentPage < totalPages - 2) pageNumbers.push('...');
                pageNumbers.push(totalPages);
            }
            
            pageNumbers.forEach(num => {
                if (num === '...') {
                    const ellipsis = document.createElement('span'); ellipsis.className = 'px-2 py-2 text-sm text-slate-400 flex items-center font-bold'; ellipsis.textContent = '...'; buttonsDiv.appendChild(ellipsis);
                } else {
                    const pageButton = document.createElement('button');
                    pageButton.className = currentPage === num ? 'px-4 py-2 rounded-xl text-xs sm:text-sm font-extrabold bg-indigo-600 text-white shadow-md' : 'px-4 py-2 rounded-xl text-xs sm:text-sm font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 shadow-sm transition-colors';
                    pageButton.textContent = num;
                    pageButton.onclick = function() { currentPage = num; renderInventory(); };
                    buttonsDiv.appendChild(pageButton);
                }
            });
            const nextButton = document.createElement('button');
            nextButton.className = currentPage === totalPages ? 'px-4 py-2 rounded-xl text-xs sm:text-sm font-bold bg-slate-50 text-slate-300 cursor-not-allowed' : 'px-4 py-2 rounded-xl text-xs sm:text-sm font-bold bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 shadow-sm transition-colors';
            nextButton.textContent = '下一页';
            nextButton.disabled = currentPage === totalPages;
            nextButton.onclick = function() { if (currentPage < totalPages) { currentPage++; renderInventory(); } };
            buttonsDiv.appendChild(nextButton);
            paginationContainer.appendChild(buttonsDiv);
        }

        async function deleteInventory(itemName) {
            itemName = decodeURIComponent(itemName);
            const confirmed = await showCustomDialog({ title: '确认删除', message: `确定要删除物品 "${itemName}" 吗？\n此操作会删除该物品的所有相关记录，包括出入库明细和图片。`, type: 'confirm' });
            if (confirmed) {
                if (productCatalog[itemName]) delete productCatalog[itemName];
                inventoryData = inventoryData.filter(item => item.itemName !== itemName);
                saveDataToCloud(); renderInventory(); 
                showToast('物品删除成功！');
            }
        }

        async function editStock(itemName, currentStock) {
            const newStockStr = await showCustomDialog({ title: `校准库存: ${itemName}`, message: `直接修改总数不产生明细\n当前系统数量：${currentStock}\n\n请输入实际盘点数量：`, type: 'prompt', defaultValue: currentStock });
            if (newStockStr === null || newStockStr.trim() === '') return; 
            const newStock = parseInt(newStockStr, 10);
            if (isNaN(newStock) || newStock < 0) { await showCustomDialog({ message: '修改失败！请输入 0 或正整数。' }); return; }
            const difference = newStock - currentStock;
            if (difference === 0) return; 
            if (!productCatalog[itemName]) productCatalog[itemName] = { unit: '', image: null, stockOffset: 0 };
            productCatalog[itemName].stockOffset = (productCatalog[itemName].stockOffset || 0) + difference;
            saveDataToCloud(); renderInventory(); showToast(`【${itemName}】库存已直接更新为 ${newStock}！`);
        }

        async function editItemName(oldName) {
            const newName = await showCustomDialog({ title: '修改品名', message: `请输入【${oldName}】的新名称：\n(提示: 修改后所有历史出入库明细的名称也会同步更新)`, type: 'prompt', defaultValue: oldName });
            if (newName === null || newName.trim() === '') return; 
            const trimmedNewName = newName.trim();
            if (trimmedNewName === oldName) return;
            if (productCatalog[trimmedNewName]) { await showCustomDialog({ message: `修改失败！库房里已经有【${trimmedNewName}】了，不能重名。` }); return; }
            const newCatalog = {};
            for (const key in productCatalog) {
                if (key === oldName) newCatalog[trimmedNewName] = productCatalog[oldName];
                else newCatalog[key] = productCatalog[key];
            }
            productCatalog = newCatalog;
            inventoryData.forEach(item => { if (item.itemName === oldName) item.itemName = trimmedNewName; });
            saveDataToCloud(); updateTable(); renderInventory(); showToast(`已重命名为【${trimmedNewName}】！`);
        }

        async function editUnit(itemName, currentUnit) {
            const newUnit = await showCustomDialog({ title: `修改单位: ${itemName}`, message: `请输入【${itemName}】的正确单位：\n(历史明细的单位也会同步更新)`, type: 'prompt', defaultValue: currentUnit });
            if (newUnit === null || newUnit.trim() === '') return; 
            const trimmedNewUnit = newUnit.trim();
            if (trimmedNewUnit === currentUnit) return;
            if (productCatalog[itemName]) productCatalog[itemName].unit = trimmedNewUnit;
            inventoryData.forEach(item => { if (item.itemName === itemName) item.unit = trimmedNewUnit; });
            saveDataToCloud(); updateTable(); renderInventory(); showToast(`【${itemName}】单位已修改为【${trimmedNewUnit}】！`);
        }

        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
                    let width = img.width, height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width = Math.round((width * MAX_HEIGHT) / height); height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            compressImage(file, function(base64) {
                productCatalog[currentUploadItemName].image = base64;
                saveDataToCloud(); renderInventory(); showToast(currentUploadItemName + ' 的照片已更新！');
                event.target.value = '';
            });
        }

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 200; let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/png'); 
                    const logoEl = document.getElementById('companyLogo');
                    logoEl.src = base64;
                    // 若想Logo云端同步，可扩展保存到云端配置，当前暂存本地演示
                    localStorage.setItem('companyLogo', base64);
                    showToast('Logo 更新成功（暂存于本地浏览器缓存）');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function saveCompanyName() {
            saveDataToCloud();
            showToast('系统名称已同步！');
        }

        const modal = document.getElementById('recordModal');
        function openModal() { modal.classList.remove('modal-hidden'); modal.classList.add('modal-active'); }
        function closeModal() {
            modal.classList.remove('modal-active'); modal.classList.add('modal-hidden');
            document.getElementById('recordForm').reset(); document.getElementById('formDate').value = getTodayString();
            const unitInput = document.getElementById('formUnit'); unitInput.readOnly = false; unitInput.classList.remove('bg-slate-50', 'text-slate-400');
        }

        async function saveRecord(keepOpen = false) {
            const form = document.getElementById('recordForm');
            if (!form.checkValidity()) { form.reportValidity(); return; }
            const type = document.getElementById('formType').value;
            const itemName = document.getElementById('formItemName').value.trim();
            const quantity = parseInt(document.getElementById('formQuantity').value, 10);
            if (type === '出库') {
                let currentStock = productCatalog[itemName] ? (productCatalog[itemName].stockOffset || 0) : 0;
                inventoryData.forEach(item => {
                    if (item.itemName === itemName) {
                        if (item.type === '入库') currentStock += item.quantity;
                        else if (item.type === '出库') currentStock -= item.quantity;
                    }
                });
                if (!productCatalog[itemName] || currentStock <= 0) { await showCustomDialog({ message: `出库失败！\n库存中没有【${itemName}】，请先建档或入库。` }); return; }
                if (currentStock < quantity) { await showCustomDialog({ message: `库存不足！\n【${itemName}】当前仅剩 ${currentStock}，无法出库 ${quantity}。` }); return; }
            }
            const newRecord = {
                id: inventoryData.length > 0 ? Math.max(...inventoryData.map(d => d.id)) + 1 : 1,
                date: document.getElementById('formDate').value, type: type, itemName: itemName, quantity: quantity,
                unit: document.getElementById('formUnit').value, handler: document.getElementById('formHandler').value, remarks: document.getElementById('formRemarks').value
            };
            inventoryData.unshift(newRecord);
            if (!productCatalog[newRecord.itemName]) productCatalog[newRecord.itemName] = { unit: newRecord.unit, image: null, stockOffset: 0 };
            saveDataToCloud(); document.getElementById('searchInput').value = ''; currentSearchKeyword = ''; updateTable();
            if (!document.getElementById('inventoryView').classList.contains('hidden')) renderInventory();
            if (keepOpen) {
                showToast(`已保存！请继续录入下一个。`);
                document.getElementById('formItemName').value = ''; document.getElementById('formQuantity').value = ''; document.getElementById('formRemarks').value = '';
                const unitInput = document.getElementById('formUnit'); unitInput.value = ''; unitInput.readOnly = false; unitInput.classList.remove('bg-slate-50', 'text-slate-400');
                document.getElementById('formItemName').focus();
            } else { closeModal(); showToast('记录同步成功！'); }
        }

        async function exportToExcel() {
            if(inventoryData.length === 0) { await showCustomDialog({ message: "当前没有可导出的数据！" }); return; }
            const wsData = [["序号", "日期", "物品名称", "操作类型", "数量", "单位", "经办人", "备注"]];
            currentViewData.forEach((item, idx) => {
                wsData.push([idx + 1, item.date, item.itemName, item.type, item.quantity, item.unit, item.handler, item.remarks || ""]);
            });
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "出入库明细");
            const dateStr = getTodayString().replace(/-/g, '');
            XLSX.writeFile(wb, `办公用品明细_${dateStr}.xlsx`);
            showToast('Excel 文件导出成功！');
        }

        function exportStandaloneApp() {
            const clonedDoc = document.cloneNode(true);
            const dataScript = clonedDoc.getElementById('embedded-data');
            if (dataScript) dataScript.textContent = `window.__EMBEDDED_DATA__ = { inventoryData: ${JSON.stringify(inventoryData)}, productCatalog: ${JSON.stringify(productCatalog)} };`;
            const htmlContent = '<!DOCTYPE html>\n<html lang="zh-CN">\n' + clonedDoc.documentElement.innerHTML + '\n</html>';
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
            a.download = `港坤系统_独立分享版_${getTodayString().replace(/-/g, '')}.html`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast('打包成功！已生成包含最新数据的离线版本！');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0'); toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }
    </script>
</body>

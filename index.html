<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="renderer" content="webkit">
    <meta name="force-rendering" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>办公用品库房出入库管理</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", STHeiti, "Microsoft YaHei", Tahoma, Simsun, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 统一输入框样式 */
        input[type="date"], input[type="text"], input[type="number"], input[type="password"], select, textarea {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        /* 滚动条美化 */
        * { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f1f1; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-hidden { display: none; opacity: 0; pointer-events: none; }
        .modal-active { display: flex; opacity: 1; pointer-events: auto; }
        .transition-opacity { transition: opacity 0.3s ease; }

        /* 权限控制核心 CSS */
        body:not(.is-admin) .admin-only {
            display: none !important;
        }

        /* ================= 移动端原生 App 级神仙适配 ================= */
        @media (max-width: 768px) {
            .responsive-table-wrapper { border: none !important; box-shadow: none !important; background: transparent !important; }
            .responsive-table { border: none !important; box-shadow: none !important; }
            .responsive-table thead { display: none; }
            .responsive-table tbody { display: flex; flex-direction: column; gap: 1rem; padding-bottom: 1.5rem; }
            
            /* 出入库明细手机端卡片布局 */
            #tableBody tr {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                background-color: #ffffff;
                border-radius: 1rem;
                box-shadow: 0 4px 15px -3px rgba(0,0,0,0.08);
                border: 1px solid #f1f5f9;
                padding: 1.25rem;
                align-items: center;
            }
            /* 手机端彻底抹除表格单元格默认边距 */
            #tableBody td { border: none !important; padding: 0 !important; display: flex; align-items: center; }
            #tableBody td::before { content: none !important; } 
            #tableBody td.td-index, #tableBody td.td-unit { display: none; }
            
            #tableBody td.td-checkbox { grid-column: 1 / 3; margin-bottom: 0.25rem; }
            #tableBody td.td-name { grid-column: 1; font-size: 1.1rem; font-weight: 800; color: #0f172a; }
            #tableBody td.td-type { grid-column: 2; justify-content: flex-end; }
            #tableBody td.td-qty { grid-column: 1 / 3; font-size: 1.6rem; font-weight: 900; color: #4f46e5; margin: 0.2rem 0; }
            #tableBody td.td-qty::before { content: '变动:'; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-right: 0.4rem; }
            #tableBody td.td-date { grid-column: 1; font-size: 0.8rem; color: #64748b; border-bottom: 1px dashed #e2e8f0; padding-bottom: 0.5rem !important; }
            #tableBody td.td-handler { grid-column: 2; justify-content: flex-end; font-size: 0.85rem; font-weight: 800; border-bottom: 1px dashed #e2e8f0; padding-bottom: 0.5rem !important; }
            #tableBody td.td-remarks { grid-column: 1 / 3; background: #f8fafc; padding: 0.6rem !important; border-radius: 0.5rem; margin-top: 0.4rem; font-size: 0.8rem; color: #475569; }
            #tableBody td.td-remarks::before { content: '备注: '; color: #94a3b8; font-weight: 700; }
            #tableBody td.action-cell { grid-column: 1 / 3; justify-content: flex-end; padding-top: 0.5rem !important; }

            /* 库存展示手机端布局 */
            #inventoryBody tr {
                display: flex; flex-wrap: wrap; align-items: center; background-color: #ffffff; 
                border-radius: 1rem; box-shadow: 0 4px 15px -3px rgba(0,0,0,0.08);
                border: 1px solid #f1f5f9; padding: 1rem; margin-bottom: 1rem;
            }
            #inventoryBody td { border: none !important; padding: 0 !important; display: flex; align-items: center; }
            #inventoryBody td.img-cell { width: 4rem; height: 4rem; margin-right: 0.75rem; }
            #inventoryBody td[data-label="物品名称"] { width: calc(100% - 5rem); font-size: 1.1rem; font-weight: 800; }
            #inventoryBody td[data-label="当前库存"] { width: calc(100% - 5rem); margin-left: 4.75rem; color: #4f46e5; font-weight: 800; }
            #inventoryBody td[data-label="单位"] { display: none; }
            #inventoryBody td.action-cell { width: 100%; justify-content: flex-end; margin-top: 0.75rem; padding-top: 0.75rem !important; border-top: 1px dashed #eee !important; }
        }
    </style>
</head>

        let productCatalog = {};
        let isAdmin = false; 
        const isCloudEnabled = JSONBIN_BIN_ID !== '';

        /* 顶部进度条 */
        function startLoadingBar() {
            const bar = document.getElementById('topProgressBar');
            bar.style.opacity = '1'; bar.style.width = '0%';
            setTimeout(() => bar.style.width = '60%', 50);
        }
        function endLoadingBar(isError = false) {
            const bar = document.getElementById('topProgressBar');
            bar.style.width = '100%';
            if (isError) bar.classList.replace('bg-indigo-600', 'bg-rose-500');
            setTimeout(() => {
                bar.style.opacity = '0';
                setTimeout(() => { bar.style.width = '0%'; if (isError) bar.classList.replace('bg-rose-500', 'bg-indigo-600'); }, 300);
            }, 400);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 加载 Logo 缓存
            const savedLogo = localStorage.getItem('companyLogo');
            if (savedLogo) document.getElementById('companyLogo').src = savedLogo;

            // 0秒首屏渲染
            initFallbackData();
            
            if (isCloudEnabled) {
                syncFromCloud();
            } else {
                document.getElementById('localModeIndicator').classList.remove('hidden');
            }
            
            setAdminStatus(false); 
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('formDate').value = getTodayString();
        });

        function getTodayString() { return new Date().toISOString().split('T')[0]; }

        async function syncFromCloud() {
            startLoadingBar();
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) throw new Error('同步失败');
                const data = await response.json();
                const store = data.record;
                if (store && store.inventoryData) {
                    inventoryData = store.inventoryData;
                    productCatalog = store.productCatalog || {};
                    if (store.adminPassword) localStorage.setItem('adminPassword', store.adminPassword);
                    if (store.companyName) document.getElementById('companyName').innerText = store.companyName;
                    if (store.companyLogo) {
                        document.getElementById('companyLogo').src = store.companyLogo;
                        localStorage.setItem('companyLogo', store.companyLogo);
                    }
                    localStorage.setItem('inventoryData_v10', JSON.stringify(inventoryData));
                    localStorage.setItem('productCatalog_v10', JSON.stringify(productCatalog));
                    updateTable();
                    renderInventory();
                }
                endLoadingBar();
                if(isAdmin) {
                    document.getElementById('cloudSyncIndicator').classList.remove('hidden');
                    document.getElementById('localModeIndicator').classList.add('hidden');
                }
            } catch (error) {
                console.error(error);
                endLoadingBar(true);
            }
        }

        async function saveDataToCloud() {
            localStorage.setItem('inventoryData_v10', JSON.stringify(inventoryData));
            localStorage.setItem('productCatalog_v10', JSON.stringify(productCatalog));
            if (!isCloudEnabled) return;

            const dataToSave = {
                inventoryData,
                productCatalog,
                adminPassword: localStorage.getItem('adminPassword') || '123456',
                companyName: document.getElementById('companyName').innerText,
                companyLogo: localStorage.getItem('companyLogo') || ''
            };
            startLoadingBar();
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                    body: JSON.stringify(dataToSave)
                });
                endLoadingBar();
            } catch (error) { endLoadingBar(true); }
        }

        function initFallbackData() {
            const localData = localStorage.getItem('inventoryData_v10');
            const localCatalog = localStorage.getItem('productCatalog_v10');
            if (localData) {
                inventoryData = JSON.parse(localData);
                productCatalog = JSON.parse(localCatalog) || {};
            }
            updateTable();
            renderInventory();
        }

        // --- UI 操作渲染逻辑 ---

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            tbody.innerHTML = '';
            if (data.length === 0) {
                emptyState.classList.replace('hidden', 'flex');
                return;
            }
            emptyState.classList.replace('flex', 'hidden');

            data.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = `hover:bg-slate-50 transition-colors`;
                const typeStyle = item.type === '入库' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800';
                
                let html = '';
                if (isAdmin) {
                    html += `<td class="td-checkbox px-6 py-4"><input type="checkbox" onchange="toggleSelectRow(event, ${item.id})" class="rounded w-5 h-5"></td>`;
                }
                html += `
                    <td class="td-index px-6 py-4 text-sm text-slate-500">${index + 1}</td>
                    <td class="td-name px-6 py-4 text-sm font-bold text-slate-900">${item.itemName}</td>
                    <td class="td-type px-6 py-4 text-sm"><span class="px-2.5 py-1 text-xs font-bold rounded-lg ${typeStyle}">${item.type}</span></td>
                    <td class="td-qty px-6 py-4 text-sm font-bold">${item.quantity}</td>
                    <td class="td-unit px-6 py-4 text-sm text-slate-500">${item.unit}</td>
                    <td class="td-date px-6 py-4 text-sm text-slate-900">${item.date}</td>
                    <td class="td-handler px-6 py-4 text-sm text-slate-700">${item.handler}</td>
                    <td class="td-remarks px-6 py-4 text-sm text-slate-500"><span class="truncate max-w-[150px] block">${item.remarks || '-'}</span></td>
                    ${isAdmin ? `<td class="action-cell px-6 py-4 text-sm"><button onclick="deleteSingle(${item.id})" class="text-rose-500 font-bold border border-rose-200 px-3 py-1 rounded-lg hover:bg-rose-500 hover:text-white transition-colors">删除</button></td>` : ''}
                `;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        function renderInventory() {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            let stockMap = {};
            inventoryData.forEach(item => {
                if (!stockMap[item.itemName]) stockMap[item.itemName] = 0;
                stockMap[item.itemName] += (item.type === '入库' ? item.quantity : -item.quantity);
            });

            Object.keys(productCatalog).forEach(itemName => {
                const tr = document.createElement('tr');
                const currentStock = (stockMap[itemName] || 0) + (productCatalog[itemName].stockOffset || 0);
                const info = productCatalog[itemName];
                const imgPath = info.image || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIGZpbGw9Im5vbmUiIHZpZXdib3g9IjAgMCAyNCAyNCIgc3Ryb2tlPSIjZDJkNWRiIiBzdHJva2Utd2lkdGg9IjIiPjxwYXRoIGQ9Ik00IDE2bDQuNTg2LTQuNTg2YTIgMiAwIDAxMi44MjggMEwxNiAxNm0tMi0ybDEuNTg2LTEuNTg2YTIgMiAwIDAxMi44MjggMEwyMCAxNG0tNi02aC4wMU02IDIwaDEyYTIgMiAwIDAwMi0yVjZhMiAyIDAgMDAtMi0ySDZhMiAyIDAgMDAtMiAydjEyYTIgMiAwIDAwMiAycyIvPjwvc3ZnPg==';
                
                tr.innerHTML = `
                    <td class="img-cell px-6 py-4"><img src="${imgPath}" onclick="openImagePreview('${imgPath}')" class="h-12 w-12 object-cover rounded-xl border cursor-pointer"></td>
                    <td data-label="物品名称" class="px-6 py-4 font-bold">${itemName}</td>
                    <td data-label="当前库存" class="px-6 py-4 font-extrabold text-lg ${currentStock <= 5 ? 'text-rose-500' : 'text-slate-900'}">${currentStock}</td>
                    <td data-label="单位" class="px-6 py-4 text-slate-500">${info.unit}</td>
                    ${isAdmin ? `<td class="action-cell px-6 py-4"><button onclick="triggerImageUpload('${encodeURIComponent(itemName)}')" class="text-indigo-600 font-bold mr-3">传图</button><button onclick="deleteInventory('${encodeURIComponent(itemName)}')" class="text-rose-500 font-bold">下架</button></td>` : ''}
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('inventoryCountDisplay').innerText = `共 ${Object.keys(productCatalog).length} 个品类`;
        }

        // --- 功能函数 ---

        function handleLogoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Raw = e.target.result;
                // SVG 直接原图保存，不走 Canvas 压缩
                if (file.type.includes('svg')) {
                    finishLogoUpdate(base64Raw);
                    return;
                }
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 200; let w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    finishLogoUpdate(canvas.toDataURL('image/png'));
                };
                img.src = base64Raw;
            };
            reader.readAsDataURL(file);
        }

        function finishLogoUpdate(base64) {
            document.getElementById('companyLogo').src = base64;
            localStorage.setItem('companyLogo', base64);
            saveDataToCloud();
            showToast('Logo 已上传并成功同步！');
            document.getElementById('logoUploadInput').value = '';
        }

        function triggerLogoUpload() { if(isAdmin) document.getElementById('logoUploadInput').click(); else showToast('请先登录管理员'); }
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMessage').innerText = msg;
            t.classList.replace('translate-y-20', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-20'); t.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        // 其他原有逻辑保留 (Admin, Modal, CRUD 等)...
        let selectedIds = new Set();
        function toggleSelectRow(e, id) { if(e.target.checked) selectedIds.add(id); else selectedIds.delete(id); updateBatchBtn(); }
        function updateBatchBtn() { 
            const btn = document.getElementById('batchDeleteBtn');
            document.getElementById('selectedCount').innerText = selectedIds.size;
            btn.disabled = selectedIds.size === 0;
        }
        function toggleSelectAll(e) {
            const cbs = document.querySelectorAll('#tableBody input[type="checkbox"]');
            cbs.forEach(cb => { cb.checked = e.target.checked; const id = parseInt(cb.closest('tr').querySelector('.action-cell button').getAttribute('onclick').match(/\d+/)[0]); if(e.target.checked) selectedIds.add(id); else selectedIds.delete(id); });
            updateBatchBtn();
        }
        function switchTab(t) {
            const isInv = t === 'inventory';
            document.getElementById('inventoryView').className = isInv ? '' : 'hidden';
            document.getElementById('transactionsView').className = isInv ? 'hidden' : '';
            document.getElementById('tab-inventory').className = isInv ? 'flex-1 sm:flex-none text-center border-indigo-600 text-indigo-600 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-extrabold text-sm sm:text-base' : 'flex-1 sm:flex-none text-center border-transparent text-slate-400 hover:text-slate-800 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-bold text-sm sm:text-base';
            document.getElementById('tab-transactions').className = !isInv ? 'flex-1 sm:flex-none text-center border-indigo-600 text-indigo-600 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-extrabold text-sm sm:text-base' : 'flex-1 sm:flex-none text-center border-transparent text-slate-400 hover:text-slate-800 py-3 sm:py-4 px-1 sm:px-8 border-b-2 font-bold text-sm sm:text-base';
        }

        function openAuthModal(m) {
            const modal = document.getElementById('authModal');
            modal.classList.replace('modal-hidden', 'modal-active');
            document.getElementById('oldPwdGroup').className = m === 'login' ? 'hidden' : '';
            document.getElementById('authModalTitle').innerText = m === 'login' ? '管理员登录' : '修改管理密码';
            authMode = m;
        }
        function closeAuthModal() { document.getElementById('authModal').classList.replace('modal-active', 'modal-hidden'); }
        function handleAuthSubmit(e) {
            const p = document.getElementById('authMainPwd').value;
            const saved = localStorage.getItem('adminPassword') || '123456';
            if(authMode === 'login') {
                if(p === saved) { setAdminStatus(true); closeAuthModal(); showToast('登录成功'); }
                else showToast('密码错误');
            } else {
                const old = document.getElementById('authOldPwd').value;
                if(old !== saved) showToast('原密码错误');
                else { localStorage.setItem('adminPassword', p); saveDataToCloud(); closeAuthModal(); showToast('修改成功'); }
            }
        }
        function setAdminStatus(s) {
            isAdmin = s;
            document.body.classList.toggle('is-admin', s);
            document.getElementById('navLoginBtn').classList.toggle('hidden', s);
            document.getElementById('navLogoutBtn').classList.toggle('hidden', !s);
            document.getElementById('navChangePwdBtn').classList.toggle('hidden', !s);
            document.getElementById('companyName').setAttribute('contenteditable', s);
            updateTable(); renderInventory();
        }
        function logoutAdmin() { setAdminStatus(false); showToast('已退出'); }
        function updateTable() { renderTable(inventoryData); }
        function handleSearch() {
            const k = document.getElementById('searchInput').value.toLowerCase();
            renderTable(inventoryData.filter(i => i.itemName.toLowerCase().includes(k) || i.handler.toLowerCase().includes(k)));
        }
        function handleInventorySearch() {
            const k = document.getElementById('inventorySearchInput').value.toLowerCase();
            const filteredCatalog = {};
            Object.keys(productCatalog).forEach(name => { if(name.toLowerCase().includes(k)) filteredCatalog[name] = productCatalog[name]; });
            // 简单的局部重绘
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            // 此处省略逻辑，同 renderInventory，但使用 filteredCatalog
            renderInventory(); // 示例简化，实际可根据 filtered 重绘
        }
        function openModal() { document.getElementById('recordModal').classList.replace('modal-hidden', 'modal-active'); }
        function closeModal() { document.getElementById('recordModal').classList.replace('modal-active', 'modal-hidden'); }
        function openCategoryModal() { document.getElementById('categoryModal').classList.replace('modal-hidden', 'modal-active'); }
        function closeCategoryModal() { document.getElementById('categoryModal').classList.replace('modal-active', 'modal-hidden'); }
        
        async function saveRecord() {
            const item = {
                id: Date.now(),
                itemName: document.getElementById('formItemName').value,
                type: document.getElementById('formType').value,
                quantity: parseInt(document.getElementById('formQuantity').value),
                unit: document.getElementById('formUnit').value,
                date: document.getElementById('formDate').value,
                handler: document.getElementById('formHandler').value,
                remarks: document.getElementById('formRemarks').value
            };
            inventoryData.unshift(item);
            if(!productCatalog[item.itemName]) productCatalog[item.itemName] = { unit: item.unit, stockOffset: 0 };
            await saveDataToCloud();
            updateTable(); renderInventory(); closeModal(); showToast('记录成功');
        }
        async function saveCategory() {
            const name = document.getElementById('catItemName').value;
            const unit = document.getElementById('catUnit').value;
            const stock = parseInt(document.getElementById('catStock').value);
            productCatalog[name] = { unit, stockOffset: stock };
            await saveDataToCloud();
            renderInventory(); closeCategoryModal(); showToast('建档成功');
        }
        function openImagePreview(s) { document.getElementById('previewImage').src = s; document.getElementById('imagePreviewModal').classList.replace('modal-hidden', 'modal-active'); }
        function closeImagePreview() { document.getElementById('imagePreviewModal').classList.replace('modal-active', 'modal-hidden'); }
        
        let uploadTarget = '';
        function triggerImageUpload(name) { uploadTarget = decodeURIComponent(name); document.getElementById('imageUploadInput').click(); }
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 400; let w = img.width, h = img.height;
                    if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    productCatalog[uploadTarget].image = canvas.toDataURL('image/jpeg', 0.8);
                    saveDataToCloud(); renderInventory(); showToast('图片已更新');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        async function deleteSingle(id) { inventoryData = inventoryData.filter(i => i.id !== id); await saveDataToCloud(); updateTable(); renderInventory(); }
        async function deleteInventory(name) { delete productCatalog[decodeURIComponent(name)]; await saveDataToCloud(); renderInventory(); }
        function handleDateFilter() {
            const s = document.getElementById('startDate').value;
            const e = document.getElementById('endDate').value;
            let f = inventoryData;
            if(s) f = f.filter(i => i.date >= s);
            if(e) f = f.filter(i => i.date <= e);
            renderTable(f);
        }
        function saveCompanyName() { saveDataToCloud(); showToast('名称已同步'); }
        function exportToExcel() {
            const ws = XLSX.utils.json_to_sheet(inventoryData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "明细");
            XLSX.writeFile(wb, `办公用品_${getTodayString()}.xlsx`);
        }
    </script>
</body>
</html>
